<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Startup Signal Scorer</title>
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #121820;
      --panel-border: #1e2836;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #6eb5ff;
      --accent-dim: #3d5a80;
      --thinking: #e3b341;
      --done: #3ecf8e;
      --fail: #f07178;
      --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
      --sans: "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap { max-width: 1400px; margin: 0 auto; padding: 1.25rem; min-height: 100%; }

    header {
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.35rem 0;
      letter-spacing: -0.02em;
    }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }

    .input-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: stretch;
      margin-top: 1rem;
    }
    .input-row input[type="url"] {
      flex: 1;
      min-width: 240px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
    }
    .input-row button {
      background: linear-gradient(135deg, #2d4a6f, var(--accent-dim));
      color: var(--text);
      border: 1px solid var(--accent-dim);
      border-radius: 8px;
      padding: 0.65rem 1.25rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .input-row button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(110, 181, 255, 0.2);
    }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 1rem;
      align-items: start;
    }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-head {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--panel-border);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: var(--mono);
    }

    #agent-log {
      font-family: var(--mono);
      font-size: 0.78rem;
      max-height: min(70vh, 640px);
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .step {
      display: flex;
      gap: 0.65rem;
      padding: 0.55rem 1rem;
      border-left: 3px solid transparent;
      animation: stepIn 0.35s ease-out;
    }
    @keyframes stepIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .step.thinking { border-left-color: var(--thinking); background: rgba(227, 179, 65, 0.06); }
    .step.done { border-left-color: var(--done); background: rgba(62, 207, 142, 0.05); }
    .step.failed { border-left-color: var(--fail); background: rgba(240, 113, 120, 0.06); }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.35rem;
      flex-shrink: 0;
    }
    .step.thinking .step-dot {
      background: var(--thinking);
      box-shadow: 0 0 10px var(--thinking);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }
    .step.done .step-dot { background: var(--done); }
    .step.failed .step-dot { background: var(--fail); }

    .step-body { flex: 1; min-width: 0; }
    .step-msg { color: var(--text); }
    .step-note { color: var(--muted); font-size: 0.72rem; margin-top: 0.25rem; }

    #report-area {
      min-height: 400px;
      padding: 1rem 1.25rem 1.5rem;
    }
    #report-area h2 {
      font-size: 1.05rem;
      margin: 1.25rem 0 0.5rem;
      color: var(--accent);
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 0.35rem;
    }
    #report-area h2:first-child { margin-top: 0; }
    #report-area .placeholder {
      color: var(--muted);
      font-style: italic;
      padding: 2rem 0;
    }
    #report-area ul { margin: 0.35rem 0; padding-left: 1.25rem; }
    #report-area .evidence { font-size: 0.85rem; color: var(--muted); margin-top: 0.35rem; }

    .snapshot-card {
      background: rgba(110, 181, 255, 0.08);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
    }
    .snapshot-card h3 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      color: var(--text);
    }
    .snapshot-meta {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem 1rem;
      font-size: 0.88rem;
    }
    .snapshot-meta dt { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .snapshot-meta dd { margin: 0.15rem 0 0; }

    .vc-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .vc-card {
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      background: rgba(0,0,0,0.15);
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .vc-card.top-rank {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(110, 181, 255, 0.35), 0 8px 28px rgba(0,0,0,0.35);
    }
    .vc-card-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
      margin-bottom: 0.65rem;
    }
    .vc-card-head strong { font-size: 1rem; }
    .verdict-badge {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--panel-border);
      white-space: normal;
      max-width: min(100%, 16rem);
      line-height: 1.35;
      text-align: left;
    }
    .verdict-strong { border-color: var(--done); color: var(--done); }
    .verdict-potential { border-color: var(--thinking); color: var(--thinking); }
    .verdict-weak { border-color: var(--muted); color: var(--muted); }
    .verdict-insufficient { border-color: var(--muted); color: var(--muted); font-style: italic; }
    .vc-card.unscorable .score-fill { opacity: 0.25; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.5rem 0 0.75rem;
    }
    .score-num { font-family: var(--mono); font-size: 1.1rem; font-weight: 600; color: var(--accent); min-width: 3.5rem; }
    .score-bar-wrap {
      flex: 1;
      height: 10px;
      border-radius: 5px;
      background: var(--panel-border);
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .pitch-box {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      background: rgba(110, 181, 255, 0.06);
      border-radius: 0 8px 8px 0;
      font-size: 0.95rem;
    }

    .confidence-bar {
      height: 8px;
      border-radius: 4px;
      background: var(--panel-border);
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width 0.9s ease-out;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Startup Signal Scorer</h1>
      <p>Single autonomous agent — paste <strong>one startup URL</strong>, click <strong>Analyze</strong>. Uses <strong>Groq</strong> via <code>/api/groq</code> and SerpAPI for VC discovery.</p>
      <div class="input-row">
        <input type="url" id="url-input" placeholder="https://your-startup.com" autocomplete="off" />
        <button type="button" id="run-btn">Analyze</button>
      </div>
    </header>

    <div class="layout">
      <div class="panel">
        <div class="panel-head">Agent activity</div>
        <div id="agent-log"></div>
      </div>
      <div class="panel">
        <div class="panel-head">Live results</div>
        <div id="report-area">
          <p class="placeholder" id="report-placeholder">Enter a startup homepage URL to see the snapshot and VC match rankings as each step finishes.</p>
          <div id="live-sections" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
/** Optional: paste SerpAPI key for local/demo (server also accepts SERPAPI_API_KEY on Vercel). */
const SERP_API_KEY = '';

const API_GROQ = '/api/groq';
const API_SERPAPI = '/api/serpapi';
const API_FETCH_PAGE = '/api/fetch-page';
const ALLORIGINS_GET = 'https://api.allorigins.win/get?url=';

const FALLBACK_VCS = [
  { name: 'Y Combinator', website: 'https://www.ycombinator.com/' },
  { name: 'First Round Capital', website: 'https://www.firstround.com/' },
  { name: 'Uncork Capital', website: 'https://uncorkcapital.com/' },
  { name: 'Lerer Hippeau', website: 'https://lererhippeau.com/' },
  { name: 'BoxGroup', website: 'https://www.boxgroup.com/' },
  { name: 'Precursor Ventures', website: 'https://precursorvc.com/' },
  { name: 'Bloomberg Beta', website: 'https://www.bloombergbeta.com/' },
  { name: 'Homebrew', website: 'https://homebrew.co/' },
  { name: 'Seedcamp', website: 'https://seedcamp.com/' },
  { name: 'Antler', website: 'https://www.antler.co/' },
];

const state = { stepEls: new Map(), groqOk: false };

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function stripCodeFences(text) {
  const t = text.trim();
  const m = t.match(/^```(?:json)?\s*([\s\S]*?)```$/i);
  return m ? m[1].trim() : t;
}

function extractBalancedJson(s) {
  const str = typeof s === 'string' ? s : '';
  const start = str.indexOf('{');
  if (start < 0) return null;
  let depth = 0;
  let inStr = false;
  let escCh = false;
  let q = '';
  for (let i = start; i < str.length; i++) {
    const c = str[i];
    if (inStr) {
      if (escCh) escCh = false;
      else if (c === '\\') escCh = true;
      else if (c === q) inStr = false;
      continue;
    }
    if (c === '"' || c === "'") {
      inStr = true;
      q = c;
      continue;
    }
    if (c === '{') depth++;
    else if (c === '}') {
      depth--;
      if (depth === 0) return str.slice(start, i + 1);
    }
  }
  return null;
}

function parseJsonLoose(text) {
  try {
    return JSON.parse(stripCodeFences(text));
  } catch {
    const b = extractBalancedJson(text);
    if (b) {
      try {
        return JSON.parse(b);
      } catch {
        return null;
      }
    }
    return null;
  }
}

function addStep(id, message, status = 'thinking', note = '') {
  const log = document.getElementById('agent-log');
  let el = state.stepEls.get(id);
  if (!el) {
    el = document.createElement('div');
    el.className = `step ${status}`;
    el.innerHTML =
      '<div class="step-dot"></div><div class="step-body"><div class="step-msg"></div><div class="step-note"></div></div>';
    log.appendChild(el);
    state.stepEls.set(id, el);
  }
  el.className = `step ${status}`;
  el.querySelector('.step-msg').textContent = message;
  el.querySelector('.step-note').textContent = note || '';
  log.scrollTop = log.scrollHeight;
}

function finishStep(id, message, note = '') {
  addStep(id, message, 'done', note);
}

function failStep(id, message, note = '') {
  addStep(id, message, 'failed', note);
}

function htmlToText(html) {
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const body = doc.body;
    if (!body) return '';
    const candidates = [
      doc.querySelector('article'),
      doc.querySelector('main'),
      doc.querySelector('[role="main"]'),
      body,
    ].filter(Boolean);
    let best = '';
    for (const el of candidates) {
      const t = (el.innerText || '').replace(/\n{3,}/g, '\n\n').trim();
      if (t.length > best.length && t.length >= 200) best = t;
    }
    const t = best || (body.innerText || '');
    return t.replace(/\n{3,}/g, '\n\n').trim();
  } catch {
    return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  }
}

function textFromHtmlMaybe(html) {
  if (!html || typeof html !== 'string') return '';
  const text = htmlToText(html);
  return text && text.length >= 120 ? text.slice(0, 80000) : '';
}

/** Same-origin server fetch first (works on Vercel when browser proxies fail). */
async function tryServerFetch(url) {
  const res = await fetch(API_FETCH_PAGE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url }),
  });
  const data = await res.json().catch(() => ({}));
  const html = typeof data.html === 'string' ? data.html : '';
  const t = textFromHtmlMaybe(html);
  if (t) return t;
  if (data.ok === false && data.error) throw new Error(data.error);
  throw new Error(data.error || 'Server fetch returned no usable text');
}

async function tryCorsProxyIo(url) {
  const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {
    headers: { Accept: 'text/html,application/xhtml+xml,*/*' },
  });
  if (!res.ok) throw new Error(`corsproxy:${res.status}`);
  const raw = await res.text();
  const t = textFromHtmlMaybe(raw);
  if (!t) throw new Error('corsproxy:short');
  return t;
}

async function fetchViaAllOrigins(url) {
  const enc = encodeURIComponent(url);
  const errors = [];
  try {
    const res = await fetch(ALLORIGINS_GET + enc);
    if (res.ok) {
      const wrap = await res.json();
      const raw = wrap.contents;
      if (typeof raw === 'string') {
        const t = textFromHtmlMaybe(raw);
        if (t) return t;
      }
    } else errors.push(`allorigins-get:${res.status}`);
  } catch (e) {
    errors.push(`allorigins-get:${e.message}`);
  }
  try {
    const res = await fetch(`https://api.allorigins.win/raw?url=${enc}`);
    if (res.ok) {
      const raw = await res.text();
      const t = textFromHtmlMaybe(raw);
      if (t) return t;
    } else errors.push(`allorigins-raw:${res.status}`);
  } catch (e) {
    errors.push(`allorigins-raw:${e.message}`);
  }
  throw new Error(errors.join(' | ') || 'Could not load page');
}

/** Ordered strategies: Vercel server → AllOrigins → corsproxy.io; optional www variant. */
async function fetchStartupPage(url) {
  const attempts = [url];
  try {
    const u = new URL(url);
    if (!u.hostname.startsWith('www.')) {
      attempts.push(`${u.protocol}//www.${u.hostname}${u.pathname}${u.search}`);
    }
  } catch {
    /* ignore */
  }

  const errs = [];
  for (const u of attempts) {
    try {
      return await tryServerFetch(u);
    } catch (e) {
      errs.push(`server:${e.message}`);
    }
    try {
      return await fetchViaAllOrigins(u);
    } catch (e) {
      errs.push(String(e.message));
    }
    try {
      return await tryCorsProxyIo(u);
    } catch (e) {
      errs.push(String(e.message));
    }
  }
  throw new Error(errs.join(' | ') || 'Could not load page');
}

async function groqComplete(userContent, systemHint, jsonMode = true, maxTokens = 3072) {
  const body = {
    messages: [
      ...(systemHint ? [{ role: 'system', content: systemHint }] : []),
      { role: 'user', content: userContent },
    ],
    temperature: 0.2,
    max_tokens: Math.min(Math.max(256, maxTokens), 8192),
  };
  if (jsonMode) body.response_format = { type: 'json_object' };

  const res = await fetch(API_GROQ, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg =
      typeof data?.error?.message === 'string'
        ? data.error.message
        : JSON.stringify(data?.error || data);
    throw new Error(msg.slice(0, 500));
  }
  const text = data?.choices?.[0]?.message?.content;
  if (text == null || String(text).trim() === '') throw new Error('Empty model response');
  return String(text);
}

async function groqCompleteRetry(
  userContent,
  systemHint,
  jsonMode = true,
  maxAttempts = 4,
  maxTokens = 3072
) {
  let lastErr;
  for (let a = 0; a < maxAttempts; a++) {
    try {
      if (a > 0) {
        const wait = 900 * a * a + Math.random() * 400;
        await new Promise((r) => setTimeout(r, wait));
      }
      return await groqComplete(userContent, systemHint, jsonMode, maxTokens);
    } catch (e) {
      lastErr = e;
      const msg = e.message || '';
      const retryable =
        /429|rate|limit|token|too large|TPM|message size/i.test(msg) && a < maxAttempts - 1;
      if (!retryable) throw e;
    }
  }
  throw lastErr;
}

function slimStartupForLlm(s) {
  const ts = s.traction_signals;
  const traction = Array.isArray(ts) ? ts.slice(0, 5).join('; ') : String(ts || '').slice(0, 400);
  return {
    company_name: String(s.company_name || '').slice(0, 120),
    one_line_description: String(s.one_line_description || '').slice(0, 500),
    sector: String(s.sector || '').slice(0, 120),
    stage: String(s.stage || '').slice(0, 40),
    business_model: String(s.business_model || '').slice(0, 80),
    key_differentiator: String(s.key_differentiator || '').slice(0, 500),
    target_customer: String(s.target_customer || '').slice(0, 400),
    traction_signals: traction.slice(0, 500),
  };
}

function slimThesisForLlm(t) {
  if (!t || typeof t !== 'object') return {};
  const th = t.themes_or_trends;
  const themes = Array.isArray(th) ? th.slice(0, 6).join('; ') : String(th || '');
  return {
    firm_name: String(t.firm_name || '').slice(0, 100),
    stage_focus: String(t.stage_focus || '').slice(0, 250),
    sector_focus: String(t.sector_focus || '').slice(0, 500),
    founder_signals: String(t.founder_signals || '').slice(0, 500),
    product_signals: String(t.product_signals || '').slice(0, 500),
    themes_or_trends: themes.slice(0, 500),
    notable_portfolio: Array.isArray(t.notable_portfolio) ? t.notable_portfolio.slice(0, 6) : [],
  };
}

async function mapPool(items, concurrency, fn) {
  const results = new Array(items.length);
  let ix = 0;
  async function worker() {
    while (true) {
      const i = ix++;
      if (i >= items.length) break;
      results[i] = await fn(items[i], i);
    }
  }
  const n = Math.max(1, Math.min(concurrency, items.length));
  await Promise.all(Array.from({ length: n }, () => worker()));
  return results;
}

/** Groq picks first, then fallbacks; dedupe by hostname. */
function mergeCandidatePool(primaryFirms, fallbackList) {
  const seen = new Set();
  const out = [];
  for (const list of [primaryFirms, fallbackList]) {
    for (const f of list) {
      const name = String(f?.name || '').trim();
      let w = String(f?.website || '').trim();
      if (!name || !w) continue;
      if (!/^https?:\/\//i.test(w)) w = 'https://' + w;
      let h = '';
      try {
        h = new URL(w).hostname.replace(/^www\./, '');
      } catch {
        continue;
      }
      if (seen.has(h)) continue;
      seen.add(h);
      out.push({ name, website: w });
    }
  }
  return out;
}

/**
 * Fetch VC homepages in parallel waves; skip failed hosts and pull more from pool until `target`
 * successes or the pool is exhausted (so Serp picks that 404 are replaced by alts, not “insufficient” slots).
 */
async function fetchVcPagesWithBackfill(pool, target) {
  const triedHosts = new Set();
  const okRows = [];

  async function fetchOne(f) {
    let h = '';
    try {
      h = new URL(f.website).hostname.replace(/^www\./, '');
    } catch {
      return null;
    }
    if (triedHosts.has(h)) return null;
    triedHosts.add(h);
    try {
      const text = await fetchStartupPage(f.website);
      return { firm: f, text, ok: true };
    } catch {
      return { firm: f, text: '', ok: false };
    }
  }

  function peekNextFirms(n) {
    const batch = [];
    for (const f of pool) {
      if (batch.length >= n) break;
      let h = '';
      try {
        h = new URL(f.website).hostname.replace(/^www\./, '');
      } catch {
        continue;
      }
      if (triedHosts.has(h)) continue;
      batch.push(f);
    }
    return batch;
  }

  let batch = peekNextFirms(target);
  let batchResults = (await Promise.all(batch.map((f) => fetchOne(f)))).filter(Boolean);
  okRows.push(...batchResults.filter((r) => r.ok));

  while (okRows.length < target) {
    const need = target - okRows.length;
    batch = peekNextFirms(Math.min(need + 3, 8));
    if (batch.length === 0) break;
    batchResults = (await Promise.all(batch.map((f) => fetchOne(f)))).filter(Boolean);
    okRows.push(...batchResults.filter((r) => r.ok));
  }

  return { rows: okRows.slice(0, target), hostsAttempted: triedHosts.size };
}

/** Long pages + long prompts exceed Groq 8B free TPM (~6k); keep excerpts compact. */
function sampleVcPageText(text, max = 5200) {
  if (!text || text.length <= max) return text;
  const head = Math.floor(max * 0.32);
  const tail = Math.floor(max * 0.32);
  const midLen = max - head - tail - 30;
  const midStart = Math.max(head, Math.floor((text.length - midLen) / 2));
  return (
    text.slice(0, head) +
    '\n[…]\n' +
    text.slice(midStart, midStart + midLen) +
    '\n[…]\n' +
    text.slice(-tail)
  );
}

/**
 * Thesis extraction: sequential-friendly, retries, JSON mode then plain JSON parse.
 * Parallel Groq bursts often return 429 on free tier → 0 profiles.
 */
async function extractVcThesis(pageText, firmName) {
  const chunk = sampleVcPageText(pageText, 4800);
  const nameLit = JSON.stringify(firmName);
  const user = `Firm name (exact): ${nameLit}

Website text:
${chunk}

Return ONE JSON object with these keys only (all strings except notable_portfolio):
- firm_name (exactly ${nameLit})
- stage_focus
- sector_focus
- founder_signals
- product_signals
- themes_or_trends (one string; comma-separate themes if needed)
- notable_portfolio (JSON array of up to 8 company name strings, or [])

If the page is mostly navigation, infer cautiously and say so in sector_focus.`;

  const sys = 'You extract VC investment thesis from website copy. Valid JSON only.';

  try {
    const o = await groqJson(user, sys, true, 2048);
    if (o && typeof o === 'object') {
      const has =
        [o.sector_focus, o.stage_focus, o.founder_signals, o.product_signals, o.themes_or_trends].some(
          (x) => String(x || '').trim().length > 4
        );
      if (has) return { ...o, firm_name: o.firm_name || firmName };
    }
  } catch {
    /* try plain completion */
  }

  try {
    const raw = await groqCompleteRetry(
      user +
        '\n\nReply with a single JSON object only. No markdown fences. No commentary before or after.',
      sys,
      false,
      4,
      2048
    );
    const o = parseJsonLoose(raw);
    if (o && typeof o === 'object') {
      return { ...o, firm_name: o.firm_name || firmName };
    }
  } catch {
    /* ignore */
  }

  return null;
}

async function groqJson(userContent, systemHint, strictRetry = true, maxTokens = 3072) {
  let raw = await groqCompleteRetry(userContent, systemHint, true, 4, maxTokens);
  let parsed = parseJsonLoose(raw);
  if (parsed && typeof parsed === 'object') return parsed;
  if (strictRetry) {
    raw = await groqCompleteRetry(
      userContent +
        '\n\nYour previous reply was not valid JSON. Reply with ONE valid JSON object only, minified, no markdown.',
      'Output only a single JSON object. No prose.',
      true,
      3,
      maxTokens
    );
    parsed = parseJsonLoose(raw);
    if (parsed && typeof parsed === 'object') return parsed;
  }
  throw new Error('Model returned malformed JSON');
}

function verdictClass(verdict) {
  const v = (verdict || '').toLowerCase();
  if (v.includes('insufficient')) return 'verdict-insufficient';
  if (v.includes('strong')) return 'verdict-strong';
  if (v.includes('potential') || v.includes('possible')) return 'verdict-potential';
  return 'verdict-weak';
}

function jsonCorpusLower(obj) {
  return JSON.stringify(obj ?? {}).toLowerCase();
}

/** Dollar amounts and large round figures must appear in allowed corpus or the line is dropped. */
function moneyFragmentsSupported(text, corpusLower) {
  if (!text || !corpusLower) return true;
  const re =
    /\$[\d,.]+(?:\s*[kKmMbB])?|\b\d[\d,.]*(?:\.\d+)?\s*(?:million|billion|thousand)\b|\b\d[\d,.]*\s*[kKmMbB]\b|\b\d[\d,.]*[kKmMbB]\b/gi;
  let m;
  const t = text;
  while ((m = re.exec(t)) !== null) {
    const raw = m[0].toLowerCase().replace(/\s+/g, ' ').trim();
    const noComma = raw.replace(/,/g, '');
    if (!corpusLower.includes(raw) && !corpusLower.includes(noComma)) return false;
  }
  return true;
}

const PROPER_SKIP = new Set(
  `the and but for with when from this that these those into over also very just only same each both than some most many such other well even they them their there then what which while where work bench focus stage sector fund firm deal deals growth early seed potential strong weak limited review confirm align matches data team teams tools platform product market analytics software technology technologies business model differentiator description line company name unknown founders customers investors companies enterprise commercial scalable vertical ecosystem pipeline outcomes results healthcare financial services`.split(
    /\s+/
  )
);

/** Multi-word titles and 5+ letter capitals must appear in corpus (startup + thesis + fund name). */
function properNounsSupported(text, corpusLower) {
  if (!text || !corpusLower) return true;
  const multi = text.match(/\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)+\b/g) || [];
  for (const phrase of multi) {
    const low = phrase.toLowerCase();
    if (corpusLower.includes(low)) continue;
    if (corpusLower.includes(low.replace(/\s+/g, '-'))) continue;
    if (corpusLower.includes(low.replace(/\s+/g, ''))) continue;
    return false;
  }
  const singles = text.match(/\b[A-Z][a-z]{4,}\b/g) || [];
  for (const w of singles) {
    const low = w.toLowerCase();
    if (PROPER_SKIP.has(low)) continue;
    if (corpusLower.includes(low)) continue;
    return false;
  }
  const acronyms = text.match(/\b[A-Z]{4,}\b/g) || [];
  for (const a of acronyms) {
    const low = a.toLowerCase();
    if (corpusLower.includes(low)) continue;
    return false;
  }
  return true;
}

function sanitizeFreeText(text, corpusLower) {
  if (text == null || typeof text !== 'string') return '';
  const s = text.trim();
  if (!s) return '';
  if (moneyFragmentsSupported(s, corpusLower) && properNounsSupported(s, corpusLower)) return s;
  return '';
}

const GENERIC_REASON =
  'Refer only to facts in the extracted startup profile — do not invent revenue, customers, or metrics.';

function sanitizeRankingAgainstStartup(row, startupSlim, thesisByName) {
  const t = thesisByName.get(row.firm_name) || {};
  const thesisSlim = slimThesisForLlm(t);
  const corpusLower = `${jsonCorpusLower(startupSlim)}\n${jsonCorpusLower(thesisSlim)}\n${String(row.firm_name || '').toLowerCase()}`;
  const scrub = (s) => sanitizeFreeText(String(s || ''), corpusLower) || GENERIC_REASON;
  const verdictRaw = String(row.one_sentence_verdict || '').trim();
  const verdictClean = sanitizeFreeText(verdictRaw, corpusLower);
  return {
    ...row,
    top_reasons: (Array.isArray(row.top_reasons) ? row.top_reasons : []).map((x) => scrub(x)),
    gaps: (Array.isArray(row.gaps) ? row.gaps : []).map((x) => scrub(x)),
    one_sentence_verdict:
      verdictClean || 'Potential fit — validate using only startup JSON fields and the fund thesis.',
  };
}

/** Voice / smart-device thesis vs data-analytics startup (no voice in JSON) → cap score. */
function clampVoiceThesisVsDataStartup(row, startupSlim, thesisByName) {
  const t = thesisByName.get(row.firm_name) || {};
  const thesisSlim = slimThesisForLlm(t);
  const startupLower = jsonCorpusLower(startupSlim);
  const thesisLower = jsonCorpusLower(thesisSlim) + '\n' + String(row.firm_name || '').toLowerCase();
  const voiceInThesis =
    /\b(voice assistant|smart home|\balexa\b|speech recognition|conversational ai|smart speaker|smart device)\b/i.test(
      thesisLower
    );
  const voiceInStartup =
    /\b(voice assistant|smart home|\balexa\b|speech recognition|conversational ai|smart speaker)\b/i.test(
      startupLower
    );
  const dataProduct =
    /\b(analytics|data team|data stack|bi\b|business intelligence|notebook|semantic layer|warehouse|sql)\b/i.test(
      startupLower
    );
  if (!voiceInThesis || voiceInStartup || !dataProduct) return row;
  const prev = Number(row.alignment_score);
  const score = Math.min(Number.isNaN(prev) ? 0 : prev, 28);
  return {
    ...row,
    alignment_score: score,
    one_sentence_verdict: 'Weak fit — fund centers on voice/smart devices; startup profile reads as data/analytics software.',
    top_reasons: [
      'Fund thesis emphasizes voice assistants, smart home, or related hardware ecosystems.',
      'Startup JSON centers on data/analytics workflows without citing voice or device platforms.',
      'High numeric scores for this pairing are usually misleading without explicit product overlap.',
    ],
    gaps: [
      'No startup-field evidence that the product targets voice UX, OEM devices, or smart-home channels.',
      'Confirm mandate with the fund’s latest investments before spending time on outreach.',
    ],
  };
}

function sanitizePitchParagraph(text, startupSlim, vcFirmName) {
  const corpusLower = `${jsonCorpusLower(startupSlim)}\n${String(vcFirmName || '').toLowerCase()}`;
  const parts = String(text || '')
    .split(/(?<=[.!?])\s+/)
    .map((s) => s.trim())
    .filter(Boolean);
  const kept = parts.filter((s) => moneyFragmentsSupported(s, corpusLower) && properNounsSupported(s, corpusLower));
  if (kept.length === 0) {
    return (
      'Angle the pitch using only the fields in the startup JSON (company, sector, model, differentiator). ' +
      'Tie those to the VC thesis language without inventing customers, revenue, or outcomes.'
    );
  }
  return kept.join(' ');
}

/** Per firm: ok thesis vs fetch failed vs page loaded but thesis too thin. */
function buildFirmDataQuality(fetchResults, thesisByName) {
  const m = new Map();
  for (const r of fetchResults) {
    if (!r.ok) {
      m.set(r.firm.name, 'fetch_failed');
      continue;
    }
    const raw = thesisByName.get(r.firm.name);
    const hasThesis =
      raw &&
      [raw.sector_focus, raw.stage_focus, raw.founder_signals, raw.product_signals, raw.themes_or_trends].some(
        (x) => String(x || '').trim().length > 8
      );
    m.set(r.firm.name, hasThesis ? 'ok' : 'thesis_weak');
  }
  return m;
}

/** Replace bogus “0 fit” with explicit insufficient-data rows. */
function applyDataQualityToRanking(row, quality) {
  if (quality === 'ok' || quality == null) return row;
  const isFetch = quality === 'fetch_failed';
  return {
    ...row,
    unscorable: true,
    alignment_score: null,
    top_reasons: isFetch
      ? [
          'Fund website could not be loaded through the fetch layer.',
          'No thesis text was available to compare against this startup.',
          'The score is shown as — on purpose: this is not a “zero fit”.',
        ]
      : [
          'Page text loaded but thesis signals were too thin to score reliably.',
          'Many VC homepages are mostly navigation; extraction often misses substance.',
          'The score is shown as — on purpose: missing data, not a “zero fit”.',
        ],
    gaps: [
      'Cannot compare stage, sector, or check size without readable thesis or portfolio cues.',
      isFetch
        ? 'Try the fund URL in a browser or re-run if the fetch failed transiently.'
        : 'Open the fund site and recent deals to judge fit manually.',
    ],
    one_sentence_verdict: 'Insufficient data — not a scored fit.',
  };
}

/** Model sometimes returns empty arrays; keep UI lists complete. */
function normalizeRankingRow(r) {
  const firm_name = String(r?.firm_name || '').trim() || 'Unknown';
  if (r?.unscorable) {
    let reasons = (Array.isArray(r?.top_reasons) ? r.top_reasons : [])
      .map((x) => String(x || '').trim())
      .filter(Boolean);
    let gaps = (Array.isArray(r?.gaps) ? r.gaps : [])
      .map((x) => String(x || '').trim())
      .filter(Boolean);
    while (reasons.length < 3) reasons.push('Thesis unavailable — manual review recommended.');
    while (gaps.length < 2) gaps.push('Confirm fit using primary sources.');
    const verdict =
      String(r?.one_sentence_verdict || '').trim() || 'Insufficient data — not a scored fit.';
    return {
      firm_name,
      alignment_score: null,
      top_reasons: reasons.slice(0, 3),
      gaps: gaps.slice(0, 2),
      one_sentence_verdict: verdict,
      unscorable: true,
    };
  }
  let score = Number(r?.alignment_score);
  if (Number.isNaN(score)) score = 0;
  score = Math.min(100, Math.max(0, score));
  let reasons = (Array.isArray(r?.top_reasons) ? r.top_reasons : [])
    .map((x) => String(x || '').trim())
    .filter(Boolean);
  let gaps = (Array.isArray(r?.gaps) ? r.gaps : [])
    .map((x) => String(x || '').trim())
    .filter(Boolean);
  while (reasons.length < 3) {
    reasons.push('No specific fit reason returned — use fund thesis and portfolio to validate.');
  }
  while (gaps.length < 2) {
    gaps.push('Confirm stage, sector, and check size against this fund’s recent deals.');
  }
  const verdict =
    String(r?.one_sentence_verdict || '').trim() ||
    (score >= 60 ? 'Potential fit — validate thesis alignment.' : 'Weak fit — limited overlap on available signals.');
  return {
    firm_name,
    alignment_score: score,
    top_reasons: reasons.slice(0, 3),
    gaps: gaps.slice(0, 2),
    one_sentence_verdict: verdict,
  };
}

${JSON.stringify(scorePack).slice(0, 12000)}

    try {
      const perVc = await mapPool(firms, 2, async (f) => {
        const t = slimThesisForLlm(thesisByName.get(f.name) || {});
        const one = `Startup:\n${JSON.stringify(startupSlim)}\n\nVC firm: ${f.name}\nThesis summary:\n${JSON.stringify(t)}\n\nReturn JSON only with keys: firm_name, alignment_score (0-100), top_reasons (3 non-empty strings), gaps (2 non-empty strings), one_sentence_verdict. firm_name must be exactly ${JSON.stringify(f.name)}.

Never invent revenue, customers, or metrics. Only cite startup facts present in the JSON. If startup.stage is "unknown", do not claim stage fit. If the fund thesis is narrowly vertical (voice/smart home, crypto, etc.) and the startup JSON does not mention that vertical, cap alignment_score at 35.`;
        try {
          const row = await groqJson(one, 'One VC score. JSON only.', true, 2048);
          if (row && (row.alignment_score != null || row.top_reasons)) {
            return { ...row, firm_name: f.name };
          }
        } catch {
          /* continue */
        }
        return {
          firm_name: f.name,
          alignment_score: 35,
          top_reasons: [
            'Limited thesis text from the fund site — directional match only.',
            `Sector overlap: ${startupSlim.sector || 'unknown'} vs fund focus.`,
            'Review fund site and portfolio for a sharper fit read.',
          ],
          gaps: ['Thesis extraction may be thin or generic.', 'Stage fit not verified from primary sources.'],
          one_sentence_verdict: 'Potential fit — confirm with fund materials and warm intro.',
        };
      });
      rankings = perVc;
    } catch (e2) {
      failStep('s6', 'Step 6 — Score & rank', esc((e2.message || '').slice(0, 120)));
      rankings = firms.map((f) => ({
        firm_name: f.name,
        alignment_score: 0,
        top_reasons: ['Scoring step did not complete.'],
        gaps: ['Try again shortly.'],
        one_sentence_verdict: 'Weak fit — analysis incomplete.',
      }));
    }
  }

  rankings = rankings.map((row) => sanitizeRankingAgainstStartup(row, startupSlim, thesisByName));
  rankings = rankings.map((row) => clampVoiceThesisVsDataStartup(row, startupSlim, thesisByName));

  const firmQuality = buildFirmDataQuality(fetchResults, thesisByName);
  rankings = rankings.map((row) =>
    applyDataQualityToRanking(row, firmQuality.get(row.firm_name))
  );
  rankings.sort((a, b) => {
    const au = a.unscorable ? 1 : 0;
    const bu = b.unscorable ? 1 : 0;
    if (au !== bu) return au - bu;
    return (b.alignment_score || 0) - (a.alignment_score || 0);
  });
  rankings = rankings.map(normalizeRankingRow);
  {
    const scoredN = rankings.filter((r) => !r.unscorable).length;
    const thinN = rankings.length - scoredN;
    finishStep(
      's6',
      'Step 6 — Score & rank',
      thinN ? `${scoredN} scored, ${thinN} insufficient data` : `${scoredN} scored`
    );
  }

  let vcCardsHtml = '<h2>VC match rankings</h2>';
  if (serpDiscoveryFailed) {
    vcCardsHtml += '<p class="evidence">SerpAPI had no results, so discovery started from the curated fund list.</p>';
  }
  const firstScorableIdx = rankings.findIndex((r) => !r.unscorable);
  vcCardsHtml += '<div class="vc-grid">';
  rankings.forEach((r, idx) => {
    const scoreNum = r.unscorable ? null : Math.min(100, Math.max(0, Number(r.alignment_score) || 0));
    const scoreDisplay = r.unscorable ? '—' : String(scoreNum);
    const barTarget = r.unscorable ? 0 : scoreNum;
    const reasons = (r.top_reasons || []).slice(0, 3);
    const gaps = (r.gaps || []).slice(0, 2);
    const verdict = r.one_sentence_verdict || 'Potential fit — review thesis.';
    const verdictShort = verdict.split('—')[0].trim();
    const top = firstScorableIdx >= 0 ? idx === firstScorableIdx : idx === 0;
    vcCardsHtml += `
      <div class="vc-card${top ? ' top-rank' : ''}${r.unscorable ? ' unscorable' : ''}" data-rank="${idx}">
        <div class="vc-card-head">
          <strong>${esc(r.firm_name)}</strong>
          <span class="verdict-badge ${verdictClass(verdict)}" title="${esc(verdict)}">${esc(verdictShort)}</span>
        </div>
        <div class="score-row">
          <span class="score-num">${esc(scoreDisplay)}</span>
          <div class="score-bar-wrap"><div class="score-fill" data-target="${barTarget}"></div></div>
        </div>
        <p><strong>Why it fits</strong></p>
        <ul>${reasons.map((x) => `<li>${esc(x)}</li>`).join('')}</ul>
        <p><strong>Gaps</strong></p>
        <ul>${gaps.map((x) => `<li>${esc(x)}</li>`).join('')}</ul>
      </div>`;
  });
  vcCardsHtml += '</div>';
  const vcSection = appendSection(vcCardsHtml);
  vcSection.querySelectorAll('.score-fill').forEach((el) => {
    const t = parseInt(el.getAttribute('data-target'), 10) || 0;
    animateScoreBar(el, t);
  });

  const topFirm = rankings.find((r) => !r.unscorable) || null;
  const topThesis = topFirm ? thesisByName.get(topFirm.firm_name) : null;

  addStep('s7', 'Step 7 — Pitch reframe (top VC)', 'thinking', topFirm ? topFirm.firm_name : '—');
  let pitchParagraph = '';
  if (topFirm && topThesis) {
    const thesisPitchPack = slimThesisForLlm(topThesis);
    try {
      const pitchRaw = await groqCompleteRetry(
        `Startup:\n${JSON.stringify(startupSlim)}\n\nVC: ${topFirm.firm_name}\nThesis (compact):\n${JSON.stringify(thesisPitchPack)}\n\nWrite ONE paragraph only.`,
        'You are a startup pitch coach. Use ONLY facts present in the Startup JSON above. Do not invent revenue figures, customer names, funding, or geographies. Based on this VC thesis and startup facts, write one paragraph on how to angle the pitch; reference the VC’s stated language. No bullet points.',
        false,
        4,
        768
      );
      pitchParagraph = sanitizePitchParagraph(pitchRaw.trim(), startupSlim, topFirm.firm_name);
    } catch {
      try {
        const pitchRaw2 = await groqCompleteRetry(
          `Startup: ${startupSlim.company_name} — ${startupSlim.one_line_description}. Sector: ${startupSlim.sector}. Differentiator: ${startupSlim.key_differentiator}.\n\nInvestor: ${topFirm.firm_name}. Known thesis summary: ${JSON.stringify(thesisPitchPack).slice(0, 1200)}.\n\nOne paragraph: how should the founder angle the pitch for this firm? Do not invent metrics or customers not listed above.`,
          'One short paragraph, no bullets. Facts only from the startup line above.',
          false,
          3,
          640
        );
        pitchParagraph = sanitizePitchParagraph(pitchRaw2.trim(), startupSlim, topFirm.firm_name);
      } catch {
        pitchParagraph =
          'Pitch reframe could not be generated (often rate limits). Wait a minute and re-run, or shorten the day’s Groq usage.';
      }
    }
  } else if (!topFirm) {
    pitchParagraph =
      'No fund had enough thesis text to tailor a pitch. Improve VC site fetch success in Step 4, or pick an investor and paste their thesis manually.';
  }
  finishStep('s7', 'Step 7 — Pitch reframe', 'Done');

  const company = startup.company_name || 'This startup';
  const vcName = topFirm ? topFirm.firm_name : 'the lead investor';
  appendSection(
    `<h2>How to pitch ${esc(company)} to ${esc(vcName)}</h2>
     <div class="pitch-box">${esc(pitchParagraph)}</div>`
  );

  addStep('s8', 'Step 8 — Reflect', 'thinking', 'Uncertainty check…');
  let reflect = { uncertainty: '', confidence: 60 };
  try {
    const rankLine = rankings
      .map((r) => `${r.firm_name}:${r.unscorable ? 'N/A' : r.alignment_score}`)
      .join('; ')
      .slice(0, 900);
    const ref = await groqJson(
      `Startup sector/stage: ${startupSlim.sector} / ${startupSlim.stage}. Scores: ${rankLine}.
N/A means fund thesis was missing (fetch or extraction), not a numeric score of zero.
Return JSON only: {"biggest_uncertainty":"","confidence_0_to_100":70}
biggest_uncertainty = one short paragraph on the single biggest uncertainty in these scores (methodology/data limits, not “funds didn’t invest”).`,
      'JSON only.',
      true,
      1024
    );
    reflect = {
      uncertainty: ref.biggest_uncertainty || '',
      confidence: Math.min(100, Math.max(0, Number(ref.confidence_0_to_100) || 60)),
    };
  } catch {
    try {
      const txt = await groqCompleteRetry(
        `In 2-3 sentences, what is the biggest weakness of using scraped VC homepages to score fit for ${startupSlim.company_name}? Then on a new line write CONFIDENCE:NN (0-100).`,
        'Be concise.',
        false,
        3,
        512
      );
      const m = txt.match(/CONFIDENCE:\s*(\d+)/i);
      reflect = {
        uncertainty: txt.replace(/\s*CONFIDENCE:\s*\d+\s*$/i, '').trim(),
        confidence: m ? Math.min(100, Math.max(0, parseInt(m[1], 10))) : 55,
      };
    } catch {
      reflect.uncertainty =
        'Treat rankings as directional: thesis text is often thin and discovery may use a fallback fund list.';
    }
  }
  finishStep('s8', 'Step 8 — Reflect', `Confidence ${reflect.confidence}/100`);

  const confFillId = 'agent-conf-fill-' + Date.now();
  appendSection(
    `<h2>Agent confidence</h2>
     <p>${esc(reflect.uncertainty)}</p>
     <p class="evidence">Score: ${reflect.confidence}/100</p>
     <div class="confidence-bar"><div class="confidence-fill" id="${confFillId}" style="width:0%"></div></div>`
  );
  const cf = document.getElementById(confFillId);
  if (cf) animateScoreBar(cf, reflect.confidence);

  if (userNote) {
    appendSection(`<p class="evidence">${esc(userNote)}</p>`);
  }
}

document.getElementById('run-btn').addEventListener('click', async () => {
  const urlInput = document.getElementById('url-input').value.trim();
  const btn = document.getElementById('run-btn');
  if (!urlInput) {
    alert('Paste a startup URL.');
    return;
  }
  try {
    new URL(urlInput);
  } catch {
    alert('Enter a valid URL including https://');
    return;
  }

  btn.disabled = true;
  try {
    const h = await fetch('/api/health').then((r) => r.json());
    if (!h.groq) {
      alert('Server needs GROQ_API_KEY (Vercel env). Add it and redeploy.');
      btn.disabled = false;
      return;
    }
    await runPipeline(urlInput);
  } catch (e) {
    document.getElementById('report-placeholder').style.display = 'none';
    showLiveSections();
    appendSection(`<h2>Something went wrong</h2><p class="evidence">${esc(e.message)}</p>`);
  } finally {
    btn.disabled = false;
  }
});
  </script>
</body>
</html>
