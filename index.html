<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic Media Analyzer — Groq or Gemini</title>
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #121820;
      --panel-border: #1e2836;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #6eb5ff;
      --accent-dim: #3d5a80;
      --thinking: #e3b341;
      --done: #3ecf8e;
      --fail: #f07178;
      --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
      --sans: "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap { max-width: 1400px; margin: 0 auto; padding: 1.25rem; min-height: 100%; }

    header {
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.35rem 0;
      letter-spacing: -0.02em;
    }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }

    .input-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: stretch;
      margin-top: 1rem;
    }
    .input-row input[type="url"],
    .input-row textarea {
      flex: 1;
      min-width: 240px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
    }
    .input-row textarea { min-height: 88px; resize: vertical; font-family: var(--sans); }
    .input-row button {
      background: linear-gradient(135deg, #2d4a6f, var(--accent-dim));
      color: var(--text);
      border: 1px solid var(--accent-dim);
      border-radius: 8px;
      padding: 0.65rem 1.25rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .input-row button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(110, 181, 255, 0.2);
    }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .options-row {
      align-items: center;
    }
    .slow-opt {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      max-width: 52rem;
    }
    .slow-opt input { margin-top: 0.2rem; flex-shrink: 0; }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 1rem;
      align-items: start;
    }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-head {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--panel-border);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: var(--mono);
    }

    #agent-log {
      font-family: var(--mono);
      font-size: 0.78rem;
      max-height: min(70vh, 640px);
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .step {
      display: flex;
      gap: 0.65rem;
      padding: 0.55rem 1rem;
      border-left: 3px solid transparent;
      animation: stepIn 0.35s ease-out;
    }
    @keyframes stepIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .step.thinking { border-left-color: var(--thinking); background: rgba(227, 179, 65, 0.06); }
    .step.done { border-left-color: var(--done); background: rgba(62, 207, 142, 0.05); }
    .step.failed { border-left-color: var(--fail); background: rgba(240, 113, 120, 0.06); }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.35rem;
      flex-shrink: 0;
    }
    .step.thinking .step-dot {
      background: var(--thinking);
      box-shadow: 0 0 10px var(--thinking);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }
    .step.done .step-dot { background: var(--done); }
    .step.failed .step-dot { background: var(--fail); }

    .step-body { flex: 1; min-width: 0; }
    .step-msg { color: var(--text); }
    .step-note { color: var(--muted); font-size: 0.72rem; margin-top: 0.25rem; }

    #report-area {
      min-height: 400px;
      padding: 1rem 1.25rem 1.5rem;
    }
    #report-area h2 {
      font-size: 1.05rem;
      margin: 1.25rem 0 0.5rem;
      color: var(--accent);
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 0.35rem;
    }
    #report-area h2:first-child { margin-top: 0; }
    #report-area .section-body {
      color: var(--text);
      font-size: 0.92rem;
    }
    #report-area .placeholder {
      color: var(--muted);
      font-style: italic;
      padding: 2rem 0;
    }
    #report-area ul { margin: 0.35rem 0; padding-left: 1.25rem; }
    #report-area .evidence { font-size: 0.85rem; color: var(--muted); margin-top: 0.35rem; }

    .graph-wrap {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
    }
    .graph-wrap h3 {
      margin: 0 0 0.75rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: var(--mono);
    }
    .source-graph {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0;
      min-height: 72px;
    }
    .graph-node {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--panel-border);
      background: rgba(110, 181, 255, 0.08);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      animation: nodePop 0.4s ease-out;
    }
    @keyframes nodePop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .graph-node.root {
      border-color: var(--accent);
      background: rgba(110, 181, 255, 0.15);
      font-weight: 600;
    }
    .graph-connector {
      color: var(--accent-dim);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0 0.25rem;
      user-select: none;
    }

    details.raw-log {
      margin-top: 1.25rem;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      overflow: hidden;
    }
    details.raw-log summary {
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      background: rgba(0,0,0,0.2);
    }
    details.raw-log pre {
      margin: 0;
      padding: 1rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 280px;
      overflow-y: auto;
      background: #0a0e14;
    }

    .confidence-bar {
      height: 8px;
      border-radius: 4px;
      background: var(--panel-border);
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width 0.6s ease-out;
    }

    #graph-svg {
      width: 100%;
      max-width: 520px;
      height: auto;
      display: block;
      margin: 0 auto 0.75rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Agentic media analyzer</h1>
      <p>Autonomous research loop — uses <strong>Groq</strong> when <code>GROQ_API_KEY</code> is set (recommended free tier), otherwise <strong>Gemini 2.0 Flash</strong>.</p>
      <div class="input-row">
        <input type="url" id="url-input" placeholder="https://… article or page URL" autocomplete="off" />
      </div>
      <div class="input-row" style="margin-top:0.5rem;">
        <textarea id="text-input" placeholder="Or paste raw text / social post / transcript here (skips fetch)"></textarea>
        <button type="button" id="run-btn">Run agent</button>
      </div>
      <div class="input-row options-row">
        <label class="slow-opt">
          <input type="checkbox" id="slow-pace" checked />
          <span
            ><strong>Slower API pacing</strong> (on by default): waits several seconds between each model call so free-tier <abbr title="tokens per minute">TPM</abbr>/<abbr title="requests per minute">RPM</abbr> limits are less likely to trip. Runs take longer but usually fewer 429 errors. Uncheck for fastest runs if your quota allows.</span
          >
        </label>
      </div>
    </header>

    <div class="layout">
      <div class="panel">
        <div class="panel-head">Agent thinking</div>
        <div id="agent-log"></div>
      </div>
      <div class="panel">
        <div class="panel-head">Live report</div>
        <div id="report-area">
          <p class="placeholder" id="report-placeholder">Submit a URL or text. The agent will plan, research, reflect, and build this report as it works.</p>
          <div id="report-sections" style="display:none;"></div>
        </div>
      </div>
    </div>

    <div class="graph-wrap">
      <h3>Source graph</h3>
      <svg id="graph-svg" viewBox="0 0 400 200" aria-label="Sources connected by the agent"></svg>
      <div class="source-graph" id="source-graph">
        <span class="graph-node root" id="graph-root">—</span>
      </div>
    </div>
  </div>

  <script>
const GEMINI_MODEL = 'gemini-2.0-flash';
/** Same-origin API (Vercel serverless). Keys live in Vercel env, not in the browser. */
const API_GEMINI = '/api/gemini';
const API_GROQ = '/api/groq';
const API_HEALTH = '/api/health';
const API_SERPER = '/api/serper';
const API_SERPAPI = '/api/serpapi';

const ALLORIGINS_GET = 'https://api.allorigins.win/get?url=';

const state = {
  reasoningLog: [],
  sourceNodes: [],
  stepEls: new Map(),
  /** Set when Gemini returns 429 / quota — shown in final report */
  lastQuotaError: null,
  /** Minimum time before next LLM request (spacing to avoid burst RPM limits) */
  geminiNextSlot: 0,
  /** 'groq' | 'gemini' — set from /api/health on each run (Groq preferred when both keys exist) */
  llmBackend: null,
  /** From #slow-pace — longer gaps between LLM calls for free tiers */
  slowPace: true,
};

const LS_LAST_RUN = 'media-analyzer-last-run-at';
const SLOW_COOLDOWN_MS = 40000;

/** Milliseconds to wait after a successful LLM response before the next request. */
function afterLlmSuccessGapMs() {
  if (!state.slowPace) {
    return state.llmBackend === 'groq' ? 800 : 600;
  }
  return state.llmBackend === 'groq' ? 6500 : 4000;
}

function logReasoning(line) {
  const ts = new Date().toISOString();
  state.reasoningLog.push(`[${ts}] ${line}`);
}

function truncate(str, max = 14000) {
  if (!str || str.length <= max) return str;
  return str.slice(0, max) + '\n\n[…truncated for model context…]';
}

function stripCodeFences(text) {
  const t = text.trim();
  const m = t.match(/^```(?:json)?\s*([\s\S]*?)```$/i);
  return m ? m[1].trim() : t;
}

/** Pull first balanced {...} from text (handles prose + markdown around JSON). */
function extractBalancedJson(s) {
  const str = typeof s === 'string' ? s : '';
  const start = str.indexOf('{');
  if (start < 0) return null;
  let depth = 0;
  let inStr = false;
  let esc = false;
  let q = '';
  for (let i = start; i < str.length; i++) {
    const c = str[i];
    if (inStr) {
      if (esc) esc = false;
      else if (c === '\\') esc = true;
      else if (c === q) inStr = false;
      continue;
    }
    if (c === '"' || c === "'") {
      inStr = true;
      q = c;
      continue;
    }
    if (c === '{') depth++;
    else if (c === '}') {
      depth--;
      if (depth === 0) return str.slice(start, i + 1);
    }
  }
  return null;
}

/** Parses "retry in 28s" (Gemini) or "try again in 31.7s" (Groq). */
function parseRetryDelayMsFromMessage(apiMessage) {
  const s = apiMessage == null ? '' : String(apiMessage);
  const m = s.match(/(?:retry|try again) in ([\d.]+)\s*s/i);
  if (m) {
    const sec = parseFloat(m[1], 10);
    if (!Number.isNaN(sec)) {
      return Math.min(120000, Math.max(3000, (Math.ceil(sec) + 2) * 1000));
    }
  }
  return 35000;
}

function isGeminiQuotaErrorText(message) {
  const m = message == null ? '' : String(message);
  return /429|quota|exceeded|rate.limit|Resource exhausted|free_tier|limit:\s*0/i.test(m);
}

async function analyzeWithGroqChat(content, task, options = {}) {
  const maxAttempts = options.retries ?? 5;
  const sys = options.systemHint || '';
  const maxIn = options.maxIn || 14000;
  const basePrompt = sys
    ? `${sys}\n\n---\nTASK: ${task}\n\n---\nCONTENT:\n${truncate(content, maxIn)}`
    : `TASK: ${task}\n\n---\nCONTENT:\n${truncate(content, maxIn)}`;

  let lastErr;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    const t0 = Date.now();
    if (t0 < state.geminiNextSlot) {
      await new Promise((r) => setTimeout(r, state.geminiNextSlot - t0));
    }
    if (attempt > 0) {
      await new Promise((r) => setTimeout(r, 400 * attempt + Math.random() * 300));
    }

    const body = {
      messages: [{ role: 'user', content: basePrompt }],
      temperature: options.temperature ?? 0.35,
      max_tokens: Math.min(options.maxOut ?? 8192, 8192),
    };
    if (options.json) {
      body.response_format = { type: 'json_object' };
    }

    try {
      const res = await fetch(API_GROQ, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const fullMsg =
          typeof data?.error?.message === 'string'
            ? data.error.message
            : typeof data?.error === 'object'
              ? JSON.stringify(data.error)
              : JSON.stringify(data?.error || data);
        const msg = fullMsg.length > 900 ? fullMsg.slice(0, 900) + '…' : fullMsg;
        const retryable =
          res.status === 429 ||
          res.status === 503 ||
          /rate.limit|quota|too many requests|capacity/i.test(fullMsg);
        if (retryable) {
          state.lastQuotaError = fullMsg;
        }
        if (retryable && attempt < maxAttempts - 1) {
          const waitMs =
            res.status === 429
              ? parseRetryDelayMsFromMessage(fullMsg)
              : 1500 * (attempt + 1);
          logReasoning(`Groq ${res.status}, waiting ~${Math.round(waitMs / 1000)}s before retry ${attempt + 2}/${maxAttempts}`);
          await new Promise((r) => setTimeout(r, waitMs));
          state.geminiNextSlot = Date.now() + (state.slowPace ? 2500 : 900);
          lastErr = new Error(`Groq HTTP ${res.status}: ${msg}`);
          continue;
        }
        throw new Error(`Groq HTTP ${res.status}: ${msg}`);
      }

      const text = data?.choices?.[0]?.message?.content;
      if (text == null || String(text).trim() === '') {
        const err = new Error('Empty Groq response');
        if (attempt < maxAttempts - 1) {
          lastErr = err;
          continue;
        }
        throw err;
      }
      state.geminiNextSlot = Date.now() + afterLlmSuccessGapMs();
      return String(text);
    } catch (e) {
      if (e.message && /Failed to fetch|network/i.test(e.message) && attempt < maxAttempts - 1) {
        await new Promise((r) => setTimeout(r, 2000 * (attempt + 1)));
        lastErr = e;
        continue;
      }
      if (attempt === maxAttempts - 1) throw e;
      lastErr = e;
    }
  }
  throw lastErr || new Error('Groq request failed');
}

async function analyzeWithGemini(content, task, options = {}) {
  if (state.llmBackend === 'groq') {
    return analyzeWithGroqChat(content, task, options);
  }
  const maxAttempts = options.retries ?? 5;
  const sys = options.systemHint || '';
  const maxIn = options.maxIn || 14000;
  const basePrompt = sys
    ? `${sys}\n\n---\nTASK: ${task}\n\n---\nCONTENT:\n${truncate(content, maxIn)}`
    : `TASK: ${task}\n\n---\nCONTENT:\n${truncate(content, maxIn)}`;

  let lastErr;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    const t0 = Date.now();
    if (t0 < state.geminiNextSlot) {
      await new Promise((r) => setTimeout(r, state.geminiNextSlot - t0));
    }
    if (attempt > 0) {
      await new Promise((r) => setTimeout(r, 400 * attempt + Math.random() * 300));
    }
    const generationConfig = {
      temperature: options.temperature ?? 0.35,
      maxOutputTokens: options.maxOut ?? 8192,
    };
    if (options.json) {
      generationConfig.responseMimeType = 'application/json';
    }
    const body = {
      contents: [{ role: 'user', parts: [{ text: basePrompt }] }],
      generationConfig,
    };

    try {
      const res = await fetch(`${API_GEMINI}?model=${encodeURIComponent(GEMINI_MODEL)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const fullMsg =
          typeof data?.error?.message === 'string'
            ? data.error.message
            : typeof data?.error === 'string'
              ? data.error
              : JSON.stringify(data?.error || data);
        const msg = fullMsg.length > 900 ? fullMsg.slice(0, 900) + '…' : fullMsg;
        const retryable =
          res.status === 429 ||
          res.status === 503 ||
          /Resource exhausted|rate|quota|exceeded your current quota/i.test(fullMsg);
        if (isGeminiQuotaErrorText(fullMsg)) {
          state.lastQuotaError = fullMsg;
        }
        if (retryable && attempt < maxAttempts - 1) {
          const waitMs =
            res.status === 429 ? parseRetryDelayMsFromMessage(fullMsg) : 1500 * (attempt + 1);
          logReasoning(`Gemini ${res.status}, waiting ~${Math.round(waitMs / 1000)}s before retry ${attempt + 2}/${maxAttempts}`);
          await new Promise((r) => setTimeout(r, waitMs));
          state.geminiNextSlot = Date.now() + (state.slowPace ? 2000 : 600);
          lastErr = new Error(`Gemini HTTP ${res.status}: ${msg}`);
          continue;
        }
        throw new Error(`Gemini HTTP ${res.status}: ${msg}`);
      }
      const parts = data?.candidates?.[0]?.content?.parts;
      if (!parts?.length) {
        const fb = data?.promptFeedback;
        const reason = data?.candidates?.[0]?.finishReason;
        const err = new Error(
          fb ? `Gemini blocked: ${JSON.stringify(fb)}` : reason ? `Empty response (${reason})` : 'Empty Gemini response'
        );
        if (attempt < maxAttempts - 1) {
          lastErr = err;
          continue;
        }
        throw err;
      }
      state.geminiNextSlot = Date.now() + afterLlmSuccessGapMs();
      return parts.map((p) => p.text || '').join('');
    } catch (e) {
      if (e.message && /Failed to fetch|network/i.test(e.message) && attempt < maxAttempts - 1) {
        await new Promise((r) => setTimeout(r, 2000 * (attempt + 1)));
        lastErr = e;
        continue;
      }
      if (attempt === maxAttempts - 1) throw e;
      lastErr = e;
    }
  }
  throw lastErr || new Error('Gemini request failed');
}

function extractLinks(content) {
  if (!content) return [];
  const re = /https?:\/\/[^\s"'<>()[\]{}]+/gi;
  const found = content.match(re) || [];
  const uniq = [...new Set(found.map((u) => u.replace(/[),.;:]+$/, '')))];
  return uniq;
}

function htmlToText(html) {
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const t = doc.body?.innerText || '';
    return t.replace(/\n{3,}/g, '\n\n').trim();
  } catch {
    return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  }
}

function isMeaningfulBody(text) {
  return text && typeof text === 'string' && text.replace(/\s+/g, ' ').trim().length >= 120;
}

/** When the page cannot be scraped, never feed error placeholders into search — use URL path + host. */
function topicGuessFromUrl(u) {
  try {
    const parsed = new URL(u);
    const stop = new Set([
      'www', 'html', 'htm', 'php', 'aspx', 'index', 'article', 'articles', 'post', 'posts', 'page', 'news', 'story',
      'id', 'p', 'q',
    ]);
    const segs = parsed.pathname.split(/[/\-_]+/).filter(Boolean);
    const words = [];
    for (const seg of segs) {
      const base = decodeURIComponent(seg).replace(/\.[a-z0-9]+$/i, '');
      for (const w of base.split(/[\-_.+]+/)) {
        const t = w.replace(/[^a-zA-Z0-9]+/g, '').trim();
        if (t.length > 2 && !stop.has(t.toLowerCase())) words.push(t);
      }
    }
    const host = parsed.hostname.replace(/^www\./, '').split('.')[0] || '';
    if (words.length) return words.slice(0, 8).join(' ');
    if (host && host.length > 2) return host;
  } catch {
    /* ignore */
  }
  return 'current events';
}

function isBadSearchTopic(t) {
  if (!t || typeof t !== 'string') return true;
  const s = t.trim();
  if (s.length < 3 || s.length > 120) return true;
  if (/^\[URL|URL provided|body could not|content unavailable|metadata-only/i.test(s)) return true;
  if (/^https?:\/\//i.test(s)) return true;
  return false;
}

function isPlaceholderPrimaryContent(s) {
  if (!s || typeof s !== 'string') return false;
  return /^\[URL provided but body could not be retrieved:/.test(s.trim()) || /^\[URL:.*\]\s*—\s*content unavailable/i.test(s.trim());
}

async function fetchContent(url) {
  const enc = encodeURIComponent(url);
  const errors = [];

  try {
    const res = await fetch(ALLORIGINS_GET + enc);
    if (res.ok) {
      const wrap = await res.json();
      const raw = wrap.contents;
      if (typeof raw === 'string') {
        const text = htmlToText(raw) || raw.slice(0, 50000);
        if (isMeaningfulBody(text)) return text.trim();
      }
    } else errors.push(`allorigins-get:${res.status}`);
  } catch (e) {
    errors.push(`allorigins-get:${e.message}`);
  }

  try {
    const res = await fetch(`https://api.allorigins.win/raw?url=${enc}`);
    if (res.ok) {
      const raw = await res.text();
      const text = htmlToText(raw) || raw;
      if (isMeaningfulBody(text)) return text.slice(0, 50000).trim();
    } else errors.push(`allorigins-raw:${res.status}`);
  } catch (e) {
    errors.push(`allorigins-raw:${e.message}`);
  }

  try {
    const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {
      headers: { Accept: 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' },
    });
    if (res.ok) {
      const raw = await res.text();
      const text = htmlToText(raw) || raw;
      if (isMeaningfulBody(text)) return text.slice(0, 50000).trim();
    } else errors.push(`corsproxy:${res.status}`);
  } catch (e) {
    errors.push(`corsproxy:${e.message}`);
  }

  throw new Error(errors.length ? errors.join(' | ') : 'No proxy returned usable text');
}

async function fetchContentWithRetry(url) {
  const max = 3;
  let lastErr;
  for (let i = 0; i < max; i++) {
    try {
      return await fetchContent(url);
    } catch (e) {
      lastErr = e;
      await new Promise((r) => setTimeout(r, 700 * (i + 1)));
    }
  }
  throw lastErr;
}

async function searchRelated(topic) {
  const q = (topic || '').trim().slice(0, 200);
  if (!q) return { results: [], source: 'none' };

  try {
    const res = await fetch(API_SERPER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q, num: 8 }),
    });
    if (res.ok) {
      const data = await res.json();
      if (data.configured && Array.isArray(data.results) && data.results.length) {
        return { results: data.results, source: data.source || 'serper' };
      }
    }
  } catch {
    /* Wikipedia fallback */
  }

  const wiki = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`;
  const res = await fetch(wiki);
  if (!res.ok) throw new Error(`Wikipedia search ${res.status}`);
  const data = await res.json();
  const hits = data.query?.search || [];
  const results = hits.slice(0, 8).map((h) => ({
    title: h.title,
    url: `https://en.wikipedia.org/wiki/${encodeURIComponent(h.title.replace(/ /g, '_'))}`,
    snippet: h.snippet?.replace(/<[^>]+>/g, '') || '',
  }));
  return { results, source: 'wikipedia' };
}

/** One LLM call for all primary-vs-related comparisons (fewer RPM/TPM hits than pairwise). */
async function compareAllSourcesBatch(primaryChunk, relatedBodies) {
  if (!relatedBodies || !relatedBodies.length) return [];
  const task =
    'Compare PRIMARY to each RELATED excerpt below. Return JSON only: {"comparisons":[{"source":"<url>","agreements":[],"disagreements":[],"uniqueClaimsPrimary":[],"uniqueClaimsRelated":[],"toneComparison":""}]}. One object per RELATED in order (RELATED_0 first); source must be that excerpt\'s URL.';
  const parts = relatedBodies.map(
    (r, i) => `RELATED_${i} (${r.url}):\n${truncate(r.body || r.snippet, 1200)}`
  );
  const content = `PRIMARY:\n${truncate(primaryChunk, 3000)}\n\n${parts.join('\n\n---\n\n')}`;
  try {
    const raw = await analyzeWithGemini(content, task, {
      temperature: 0.2,
      json: true,
      maxOut: 5000,
      retries: 5,
      maxIn: 16000,
    });
    const parsed = parseJsonLoose(raw);
    const arr = parsed?.comparisons;
    if (!Array.isArray(arr)) return [];
    return arr.map((c, i) => ({
      source: c.source || relatedBodies[i]?.url || '',
      agreements: c.agreements || [],
      disagreements: c.disagreements || [],
      uniqueClaims1: c.uniqueClaimsPrimary || c.uniqueClaims1,
      uniqueClaims2: c.uniqueClaimsRelated || c.uniqueClaims2,
      toneComparison: c.toneComparison || '',
    }));
  } catch (e) {
    logReasoning(`Batch compare fail: ${e.message}`);
    return [];
  }
}

function renderHubSvg() {
  const svg = document.getElementById('graph-svg');
  if (!svg) return;
  const nodes = state.sourceNodes;
  svg.innerHTML = '';
  if (!nodes.length) return;

  const w = 400;
  const h = 200;
  const cx = w / 2;
  const cy = h / 2;
  const root = nodes[0];
  const sat = nodes.slice(1);
  const ns = 'http://www.w3.org/2000/svg';
  const strokeCol = '#3d5a80';
  const accent = '#6eb5ff';

  function el(name, attrs) {
    const e = document.createElementNS(ns, name);
    Object.entries(attrs || {}).forEach(([k, v]) => e.setAttribute(k, v));
    return e;
  }

  sat.forEach((node, i) => {
    const n = Math.max(sat.length, 1);
    const R = 78;
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = cx + R * Math.cos(angle);
    const y = cy + R * Math.sin(angle);
    const line = el('line', {
      x1: cx,
      y1: cy,
      x2: x,
      y2: y,
      stroke: strokeCol,
      'stroke-width': 1.5,
      opacity: 0.85,
    });
    svg.appendChild(line);
    const c = el('circle', {
      cx: x,
      cy: y,
      r: 9,
      fill: 'rgba(110,181,255,0.12)',
      stroke: '#1e2836',
      'stroke-width': 2,
    });
    svg.appendChild(c);
    const t = el('text', {
      x,
      y: y + 24,
      'text-anchor': 'middle',
      fill: '#8b9cb3',
      'font-size': 9,
      'font-family': 'ui-monospace, monospace',
    });
    const lab = (node.label || '').slice(0, 22);
    t.textContent = lab + ((node.label || '').length > 22 ? '…' : '');
    svg.appendChild(t);
  });

  const rc = el('circle', {
    cx,
    cy,
    r: 16,
    fill: 'rgba(110,181,255,0.22)',
    stroke: accent,
    'stroke-width': 2,
  });
  svg.appendChild(rc);
  const rt = el('text', {
    x: cx,
    y: cy + 4,
    'text-anchor': 'middle',
    fill: '#e6edf3',
    'font-size': 10,
    'font-weight': '600',
    'font-family': 'ui-monospace, monospace',
  });
  const rl = (root.label || 'Primary').slice(0, 18);
  rt.textContent = rl + ((root.label || '').length > 18 ? '…' : '');
  svg.appendChild(rt);
}

function parseJsonLoose(text) {
  if (text == null || text === '') return null;
  let s = String(text).trim();
  const fenced = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if (fenced) s = fenced[1].trim();
  else s = stripCodeFences(s);
  try {
    return JSON.parse(s);
  } catch {
    const balanced = extractBalancedJson(s);
    if (balanced) {
      try {
        return JSON.parse(balanced);
      } catch {
        /* fall through */
      }
    }
    const start = s.indexOf('{');
    const end = s.lastIndexOf('}');
    if (start >= 0 && end > start) {
      try {
        return JSON.parse(s.slice(start, end + 1));
      } catch {
        return null;
      }
    }
    return null;
  }
}

async function agentHandleToolError(toolName, err, context) {
  logReasoning(`TOOL_FAIL ${toolName}: ${err.message}`);
  try {
    const msg = await analyzeWithGemini(
      `Tool: ${toolName}\nContext: ${context}\nError: ${err.message}`,
      'You are the agent. In plain English (no raw error codes), explain what went wrong and what you will do instead: retry, skip, or use an alternative. Output JSON only: {"userMessage":"","decision":"retry|skip|alternative","followUp":""}',
      { maxIn: 800, temperature: 0.3, json: true, retries: 3 }
    );
    return parseJsonLoose(msg) || { userMessage: 'That step did not finish; moving on with what we already have.', decision: 'skip', followUp: '' };
  } catch {
    return {
      userMessage: 'A network or service hiccup blocked that step. The agent will skip it and keep working.',
      decision: 'skip',
      followUp: '',
    };
  }
}

  }

    );
    return;
  }

  if (!urlInput && !textInput) {
    alert('Enter a URL or paste content.');

  }

  if (urlInput) {

      new URL(urlInput);
    } catch {
      alert('That URL is not valid. Include https:// or paste text in the box instead.');
      return;
    }
  }

  const slowPaceEl = document.getElementById('slow-pace');

  if (state.slowPace) {
    try {
      const last = parseInt(localStorage.getItem(LS_LAST_RUN) || '0', 10);
      const now = Date.now();
      if (last > 0 && now - last < SLOW_COOLDOWN_MS) {
        const sec = Math.ceil((SLOW_COOLDOWN_MS - (now - last)) / 1000);
        alert(
          `To reduce free-tier 429 errors, wait about ${sec}s before another full run — or uncheck “Slower API pacing” to skip this cooldown (faster, but easier to hit limits).`
        );
        return;
      }
    } catch {
      /* private mode / no storage */
    }
  }

  btn.disabled = true;
  document.getElementById('agent-log').innerHTML = '';
  state.stepEls.clear();
  state.reasoningLog = [];
  state.lastQuotaError = null;
  state.geminiNextSlot = 0;
  clearReport();

  try {
    await executeAgentPipeline(urlInput, textInput);
  } catch (e) {
    addStep('fatal', 'Agent stopped', 'failed', e.message || String(e));
    logReasoning(`FATAL: ${e.message}`);
  } finally {
    btn.disabled = false;
    try {
      localStorage.setItem(LS_LAST_RUN, String(Date.now()));
    } catch {
      /* ignore */
    }
  }
}

async function executeAgentPipeline(urlInput, textInput) {
  let primaryContent = '';
  let primaryLabel = 'Pasted content';
  let inputType = 'unknown';

  if (textInput) {
    primaryContent = textInput;
    primaryLabel = 'Pasted text';
    setGraphRoot(primaryLabel);
    addStep('ingest', 'Received pasted content…', 'thinking');
    finishStep('ingest', 'Ingested pasted content', `${primaryContent.length} characters`);
    logReasoning('Input: pasted text');
  } else {
    let host = urlInput;
    try {
      host = new URL(urlInput).hostname || urlInput;
    } catch {
      /* validated earlier */
    }
    primaryLabel = urlInput;
    setGraphRoot(host);
    addStep('fetch', 'Fetching original URL…', 'thinking');
    try {
      primaryContent = await fetchContentWithRetry(urlInput);
      finishStep('fetch', 'Fetched original content', `${primaryContent.length} chars extracted`);
      logReasoning(`Fetched URL OK: ${urlInput}`);
    } catch (e) {
      const handled = await agentHandleToolError('fetchContent', e, urlInput);
      failStep('fetch', 'Could not fully load that page', handled.userMessage || 'The page may block proxies or require login.');
      logReasoning(`Fetch failed: ${e.message}; decision: ${handled.decision}`);
      if (handled.decision === 'skip') {
        primaryContent = `[URL provided but body could not be retrieved: ${urlInput}]\nUser context: ${handled.followUp || ''}`;
      } else {
        try {
          primaryContent = await fetchContentWithRetry(urlInput);
          finishStep('fetch-retry', 'Fetched on retry', '');
        } catch (e2) {
          primaryContent = `[URL: ${urlInput}] — content unavailable. Proceeding with metadata-only analysis.`;
        }
      }
    }
  }

  const MAX_PRIMARY_STORE = 12000;
  if (primaryContent.length > MAX_PRIMARY_STORE) {
    primaryContent =
      primaryContent.slice(0, MAX_PRIMARY_STORE) + '\n\n[…trimmed to save API tokens; original page was longer…]';
    logReasoning(`Primary text capped at ${MAX_PRIMARY_STORE} characters for LLM quota`);
  }

  if (state.slowPace) {
    logReasoning(
      `Slow pacing: ~${Math.round(afterLlmSuccessGapMs() / 1000)}s between ${state.llmBackend} calls; ${Math.round(SLOW_COOLDOWN_MS / 1000)}s min between full runs`
    );
  }

  addStep(
    'llm',
    state.llmBackend === 'groq' ? 'Using Groq (Llama) for this run…' : 'Using Google Gemini for this run…',
    'done',
    state.llmBackend === 'groq' ? 'Server has GROQ_API_KEY' : 'Server has GEMINI_API_KEY'
  );

  addStep('plan', 'Planning + topic scope (single model request)…', 'thinking');
  const planTopicTask = `You are an autonomous media research agent. From the CONTENT below, do BOTH in one JSON object:

1) Classify medium and plan: inputType (article|video|social|image|unknown), rationale (one sentence), plannedSteps (short labels), extractionHints (strings).

2) Propose one search query for related coverage: topic (max 8 words), authors (strings), mentionedTopics (strings).

Return ONE JSON with all keys: inputType, rationale, plannedSteps, extractionHints, topic, authors, mentionedTopics.`;

  let planTopicContent;
  if (textInput) {
    planTopicContent = truncate(primaryContent, 3800);
  } else if (urlInput && isPlaceholderPrimaryContent(primaryContent)) {
    planTopicContent = `Submitted URL (page body not retrieved by proxy): ${urlInput}\nInfer type from domain/path; infer topic from URL slug — never echo error placeholders.`;
  } else {
    planTopicContent = truncate(primaryContent, 3800) + (urlInput ? `\nURL: ${urlInput}` : '');
  }

  let plan;
  let topicBundle;
  try {
    const planTopicRaw = await analyzeWithGemini(planTopicContent || urlInput || '', planTopicTask, {
      maxIn: 4500,
      temperature: 0.2,
      json: true,
      retries: 5,
    });
    const merged = parseJsonLoose(planTopicRaw);
    if (merged && typeof merged === 'object') {
      plan = {
        inputType: merged.inputType || 'unknown',
        rationale: merged.rationale || '',
        plannedSteps: merged.plannedSteps || [],
        extractionHints: merged.extractionHints || [],
      };
      topicBundle = {
        topic: merged.topic || '',
        authors: Array.isArray(merged.authors) ? merged.authors : [],
        mentionedTopics: Array.isArray(merged.mentionedTopics) ? merged.mentionedTopics : [],
      };
    } else {
      throw new Error('Unparseable plan+topic JSON');
    }
  } catch (e) {
    plan = {
      inputType: 'unknown',
      rationale: 'Fallback after plan+topic model error.',
      plannedSteps: ['extract links', 'topic search', 'related fetch', 'compare', 'reflect', 'report'],
      extractionHints: [],
    };
    topicBundle = { topic: '', authors: [], mentionedTopics: [] };
    logReasoning(`Plan+topic fallback: ${e.message}`);
  }
  if (!plan || typeof plan !== 'object') {
    plan = {
      inputType: 'unknown',
      plannedSteps: ['extract links', 'topic search', 'related fetch', 'compare', 'reflect', 'report'],
      rationale: 'Default plan',
      extractionHints: [],
    };
  }
  if (!topicBundle) topicBundle = { topic: '', authors: [], mentionedTopics: [] };

  inputType = plan.inputType || 'unknown';
  finishStep(
    'plan',
    'Planning + topic complete',
    `Type: ${inputType} — ${(plan.plannedSteps || []).slice(0, 3).join(' → ')}${(plan.plannedSteps || []).length > 3 ? '…' : ''}`
  );
  logReasoning(`PLAN+TOPIC: ${JSON.stringify({ plan, topicBundle })}`);
  appendLiveFinding(`Classified input as “${inputType}”: ${plan.rationale || '—'}`);

  addStep('links', 'Extracting links (local)…', 'thinking');
  const links = extractLinks(primaryContent + '\n' + (urlInput || ''));
  let searchTopic = (topicBundle.topic || '').trim();
  if (isBadSearchTopic(searchTopic)) {
    if (urlInput) searchTopic = topicGuessFromUrl(urlInput);
    else {
      const words = (primaryContent || '')
        .split(/\s+/)
        .filter((w) => w.length > 2 && !/^\[URL/.test(w))
        .slice(0, 6);
      searchTopic = words.join(' ') || 'news';
    }
  }
  if (isBadSearchTopic(searchTopic)) searchTopic = 'news';
  finishStep('links', `Found ${links.length} URLs; topics scoped`, `Search focus: “${searchTopic}”`);
  logReasoning(`Links: ${links.length}, topic: ${searchTopic}`);
  const auth = (topicBundle.authors || []).slice(0, 3).join(', ');
  appendLiveFinding(
    `Extracted ${links.length} links; search focus “${searchTopic}”${auth ? `; signals of authors: ${auth}` : ''}`
  );

  const vcYear = new Date().getFullYear();
  const vcSearchQuery = `top VC firms investing in ${searchTopic} ${vcYear} thesis`;
  let vcFirms = [];
  let vcAlignment = null;
  let vcReflectMeta = { hasGap: false, rationale: '', suggestedSearchQuery: '', extraDigest: '' };

  async function serpApiSearch(q) {
    const res = await fetch(API_SERPAPI, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: (q || '').slice(0, 400) }),
    });
    if (!res.ok) return { configured: false, organic_results: [], source: 'error' };
    return res.json();
  }

  function normalizeFirmWebsite(u) {
    let s = String(u || '').trim();
    if (!s) return '';
    if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
    try {
      const p = new URL(s);
      return p.origin + '/';
    } catch {
      return s;
    }
  }

  addStep('vc-discover', 'DISCOVER: VC firms (SerpAPI)…', 'thinking');
  try {
    const serpData = await serpApiSearch(vcSearchQuery);
    if (!serpData.configured) {
      finishStep('vc-discover', 'SerpAPI not configured', 'Set SERPAPI_API_KEY on Vercel to enable VC discovery');
      logReasoning('VC discover skipped: SERPAPI_API_KEY missing');
    } else if (serpData.serpapi_error) {
      finishStep('vc-discover', 'SerpAPI error', String(serpData.serpapi_error).slice(0, 120));
      logReasoning(`VC SerpAPI: ${serpData.serpapi_error}`);
    } else {
      const organic = Array.isArray(serpData.organic_results) ? serpData.organic_results : [];
      const serpPack = JSON.stringify(
        organic.slice(0, 10).map((o) => ({ title: o.title, link: o.link, snippet: o.snippet }))
      ).slice(0, 12000);
      const pickFirmsTask = `From these Google search results, pick up to 3 distinct venture capital firms or VC funds investing in the space implied by the query (not portfolio companies, not media sites unless clearly a fund). For each: canonical firm name and best official website URL (https). Prefer domains owned by the fund.
Return JSON only: {"firms":[{"name":"","website":""}]}
Max 3 firms; fewer if results are thin.`;
      try {
        const pickRaw = await analyzeWithGemini(serpPack, pickFirmsTask, {
          temperature: 0.15,
          json: true,
          retries: 4,
          maxIn: 14000,
          maxOut: 2048,
        });
        const picked = parseJsonLoose(pickRaw);
        const arr = Array.isArray(picked?.firms) ? picked.firms : [];
        const seen = new Set();
        for (const f of arr) {
          const name = String(f?.name || '').trim();
          let website = normalizeFirmWebsite(f?.website);
          if (!name || !website) continue;
          const host = (() => {
            try {
              return new URL(website).hostname.replace(/^www\./, '');
            } catch {
              return website;
            }
          })();
          if (seen.has(host)) continue;
          seen.add(host);
          vcFirms.push({ name, website });
          if (vcFirms.length >= 3) break;
        }
      } catch (e) {
        logReasoning(`VC firm pick LLM error: ${e.message}`);
      }
      finishStep(
        'vc-discover',
        vcFirms.length ? `Identified ${vcFirms.length} VC firm(s)` : 'No VC firms extracted',
        vcFirms.map((f) => f.name).join(' · ') || vcSearchQuery
      );
      logReasoning(`VC DISCOVER query="${vcSearchQuery}" firms=${JSON.stringify(vcFirms)}`);
      if (vcFirms.length) {
        appendLiveFinding(`VC discovery: ${vcFirms.length} firm(s) — ${vcFirms.map((f) => f.name).join(', ')}`);
      }
    }
  } catch (e) {
    finishStep('vc-discover', 'VC discovery failed', e.message || 'error');
    logReasoning(`VC discover: ${e.message}`);
  }

  for (let fi = 0; fi < vcFirms.length; fi++) {
    const firm = vcFirms[fi];
    const stepId = `vc-research-${fi}`;
    addStep(stepId, `RESEARCH: ${firm.name} (site + thesis)…`, 'thinking');
    let pageText = '';
    try {
      pageText = await fetchContentWithRetry(firm.website);
    } catch (e) {
      logReasoning(`VC fetch ${firm.website}: ${e.message}`);
    }
    const thesisTask = `Extract this VC firm's core investment thesis, key focus areas, and what kinds of companies they look for. Return as structured JSON with keys: coreThesis (string), keyFocusAreas (array of strings), companyProfile (string, what they seek in founders/market/stage).`;
    let thesisObj = null;
    try {
      const thesisRaw = await analyzeWithGemini(truncate(pageText || firm.website, 10000), thesisTask, {
        temperature: 0.2,
        json: true,
        retries: 4,
        maxIn: 12000,
        maxOut: 3072,
      });
      thesisObj = parseJsonLoose(thesisRaw);
    } catch (e) {
      logReasoning(`VC thesis ${firm.name}: ${e.message}`);
    }
    firm.thesis =
      thesisObj && typeof thesisObj === 'object'
        ? {
            coreThesis: String(thesisObj.coreThesis || ''),
            keyFocusAreas: Array.isArray(thesisObj.keyFocusAreas) ? thesisObj.keyFocusAreas : [],
            companyProfile: String(thesisObj.companyProfile || ''),
          }
        : { coreThesis: '', keyFocusAreas: [], companyProfile: '' };
    finishStep(
      stepId,
      `Thesis extracted: ${firm.name}`,
      (firm.thesis.coreThesis || '').slice(0, 100) || 'Limited text from site'
    );
    appendLiveFinding(`VC thesis stored: ${firm.name}`);
  }

  if (vcFirms.length) {
    addStep('vc-score', 'SCORE: alignment vs each VC thesis…', 'thinking');
    const scorePack = {
      articleExcerpt: truncate(primaryContent, 6000),
      firms: vcFirms.map((f) => ({
        name: f.name,
        website: f.website,
        thesis: f.thesis,
      })),
    };
    const scoreTask = `You are a startup advisor. Score how well the ARTICLE (excerpt) aligns with each VC firm's investment thesis on a scale of 1-100.
For each firm provide:
- alignmentScore (1-100)
- topReasons (exactly 3 strings: strongest alignment points)
- gaps (exactly 2 strings: mismatches or risks for this fund)
- pitchAngle (one sentence pitch angle tailored to this specific firm)
Be specific; reference actual thesis language from the JSON.

Return JSON only: {"scores":[{"firmName":"","website":"","alignmentScore":0,"topReasons":["","",""],"gaps":["",""],"pitchAngle":""}]}
Use the same firm order as input. firmName must match.`;
    try {
      const scoreRaw = await analyzeWithGemini(JSON.stringify(scorePack), scoreTask, {
        temperature: 0.25,
        json: true,
        retries: 4,
        maxIn: 16000,
        maxOut: 4096,
      });
      const scored = parseJsonLoose(scoreRaw);
      vcAlignment = Array.isArray(scored?.scores) ? scored.scores : null;
    } catch (e) {
      logReasoning(`VC score error: ${e.message}`);
    }
    finishStep(
      'vc-score',
      vcAlignment ? 'Alignment scores computed' : 'Scoring incomplete',
      vcAlignment ? `${vcAlignment.length} firm(s)` : '—'
    );
    if (vcAlignment) {
      appendLiveFinding(
        `VC alignment: ${vcAlignment.map((s) => `${s.firmName || '?'} ${s.alignmentScore ?? '—'}/100`).join('; ')}`
      );
    }

    addStep('vc-reflect', 'REFLECT: review VC analysis + optional search…', 'thinking');
    const reflectTask = `Review your own VC alignment analysis (scores, reasons, gaps) against the original article excerpt. Are there gaps in your research? Did you miss any important signals in the original content? If yes, what ONE additional search query would improve your confidence?
Return JSON only: {"hasGap":true|false,"rationale":"","suggestedSearchQuery":""}
If hasGap is false, suggestedSearchQuery must be "".`;
    const reflectBlob = JSON.stringify({
      articleExcerpt: truncate(primaryContent, 3500),
      alignment: vcAlignment,
    }).slice(0, 14000);
    try {
      const reflRaw = await analyzeWithGemini(reflectBlob, reflectTask, {
        temperature: 0.2,
        json: true,
        retries: 3,
        maxIn: 16000,
        maxOut: 2048,
      });
      const refl = parseJsonLoose(reflRaw);
      if (refl && typeof refl === 'object') {
        vcReflectMeta = {
          hasGap: refl.hasGap === true,
          rationale: String(refl.rationale || ''),
          suggestedSearchQuery: String(refl.suggestedSearchQuery || '').trim(),
          extraDigest: '',
        };
      }
    } catch (e) {
      logReasoning(`VC reflect error: ${e.message}`);
    }

    if (vcReflectMeta.hasGap && vcReflectMeta.suggestedSearchQuery) {
      addStep('vc-gap-search', 'Follow-up search from reflection…', 'thinking');
      try {
        const serp2 = await serpApiSearch(vcReflectMeta.suggestedSearchQuery);
        const org2 = Array.isArray(serp2.organic_results) ? serp2.organic_results : [];
        const pack2 = JSON.stringify(
          org2.slice(0, 8).map((o) => ({ title: o.title, link: o.link, snippet: o.snippet }))
        ).slice(0, 10000);
        const digestTask = `Summarize these search snippets for an investor-alignment memo. JSON only: {"bullets":["","",""]} max 3 bullets; be concrete.`;
        const digRaw = await analyzeWithGemini(pack2, digestTask, {
          temperature: 0.2,
          json: true,
          retries: 3,
          maxIn: 12000,
          maxOut: 1024,
        });
        const dig = parseJsonLoose(digRaw);
        const bullets = Array.isArray(dig?.bullets) ? dig.bullets : [];
        vcReflectMeta.extraDigest = bullets.map((b) => String(b)).filter(Boolean).join('\n');
        finishStep('vc-gap-search', 'Reflection follow-up incorporated', vcReflectMeta.suggestedSearchQuery.slice(0, 80));
      } catch (e) {
        finishStep('vc-gap-search', 'Follow-up search failed', e.message || 'error');
        logReasoning(`VC gap search: ${e.message}`);
      }
    }
    finishStep(
      'vc-reflect',
      vcReflectMeta.hasGap && vcReflectMeta.suggestedSearchQuery
        ? 'Reflection complete (with follow-up search)'
        : 'Reflection complete',
      (vcReflectMeta.rationale || '').slice(0, 140) || '—'
    );
    logReasoning(`VC REFLECT: ${JSON.stringify(vcReflectMeta)}`);
  }

  addStep('search', 'Searching for related / competing sources…', 'thinking');
  let searchPack;
  try {
    searchPack = await searchRelated(searchTopic);
  } catch (e) {
    const h = await agentHandleToolError('searchRelated', e, searchTopic);
    addStep('search', 'Search had issues', 'failed', h.userMessage);
    searchPack = { results: [], source: 'failed' };
  }
  const filteredResults = (searchPack.results || []).filter((r) => {
    if (!r.url) return false;
    if (urlInput && r.url === urlInput) return false;
    return true;
  });
  finishStep(
    'search',
    `Related search complete (${searchPack.source})`,
    `${filteredResults.length} candidate sources`
  );
  logReasoning(`Search ${searchPack.source}: ${filteredResults.length} results`);
  appendLiveFinding(`Discovery: ${filteredResults.length} related results via ${searchPack.source}${searchPack.source === 'failed' ? ' (degraded)' : ''}`);

  addStep('related', 'Fetching and analyzing related sources…', 'thinking');
  const relatedBodies = [];
  const maxRelated = 2;
  for (let i = 0; i < Math.min(maxRelated, filteredResults.length); i++) {
    const r = filteredResults[i];
    const stepId = `related-${i}`;
    addStep(stepId, `Pulling: ${r.title?.slice(0, 50) || r.url}…`, 'thinking');
    try {
      const body = await fetchContentWithRetry(r.url);
      relatedBodies.push({ title: r.title, url: r.url, body, snippet: r.snippet });
      addGraphNode(r.title || r.url, r.url);
      finishStep(stepId, `Analyzed related source ${i + 1}`, r.url);
      logReasoning(`Related OK: ${r.url}`);
    } catch (e) {
      const h = await agentHandleToolError('fetchContent', e, r.url);
      failStep(stepId, 'Skipped a related URL', h.userMessage || 'Could not load; trying next.');
      logReasoning(`Related fail ${r.url}: ${h.decision}`);
    }
  }
  if (relatedBodies.length === 0) {
    finishStep('related', 'No extra pages loaded; using search snippets only', 'Agent will rely on snippets and primary content');
  } else {
    finishStep('related', `Loaded ${relatedBodies.length} related full-text sources`, '');
  }

  addStep('compare', 'Cross-referencing (single batched model request)…', 'thinking');
  let comparisons = [];
  const primaryChunk = truncate(primaryContent, 4000);
  comparisons = await compareAllSourcesBatch(primaryChunk, relatedBodies);
  finishStep(
    'compare',
    'Cross-reference pass complete',
    `${comparisons.length} source lens(es) in one batch`
  );
  appendLiveFinding(`Cross-checked primary vs ${relatedBodies.length} related source(s) in one request`);

  addStep('sentiment', 'Sentiment + reflection (single model request)…', 'thinking');
  const sentReflectTask = `You have PRIMARY and RELATED excerpts below.

Return ONE JSON object with two parts:

1) sentiment: { "primary": {"score": -1|0|1, "evidence": ""}, "related": [ {"label":"","score":-1|0|1,"evidence":""} ] } — sentiment toward the main subject.

2) reflection: { "satisfied": true|false, "confidence": 0-100, "gaps": [], "nextQueries": [], "narrative": "one sentence" } — whether research is enough for a final report.

Use keys exactly: sentiment, reflection.`;

  const sentBlob = relatedBodies
    .map((r, j) => `RELATED_${j} (${r.url}): ${truncate(r.body || r.snippet, 1200)}`)
    .join('\n\n');
  let sentiment = {};
  let reflection = {
    satisfied: true,
    confidence: 68,
    gaps: [],
    nextQueries: [],
    narrative: 'Proceeding with available data.',
  };
  try {
    const srRaw = await analyzeWithGemini(
      `PRIMARY:\n${truncate(primaryChunk, 2800)}\n\nCOMPARISONS_SUMMARY:\n${JSON.stringify(comparisons).slice(0, 2500)}\n\n${sentBlob}`,
      sentReflectTask,
      { temperature: 0.2, json: true, retries: 5, maxIn: 14000, maxOut: 4096 }
    );
    const sr = parseJsonLoose(srRaw);
    if (sr && typeof sr === 'object') {
      sentiment = sr.sentiment && typeof sr.sentiment === 'object' ? sr.sentiment : {};
      if (sr.reflection && typeof sr.reflection === 'object') {
        reflection = {
          satisfied: sr.reflection.satisfied !== false,
          confidence: sr.reflection.confidence ?? 68,
          gaps: sr.reflection.gaps || [],
          nextQueries: sr.reflection.nextQueries || [],
          narrative: sr.reflection.narrative || '',
        };
      }
    }
  } catch (e) {
    logReasoning(`Sentiment+reflection error: ${e.message}`);
  }

  const sat = reflection.satisfied !== false;
  let finalConfidence = reflection.confidence ?? 68;

  finishStep('sentiment', 'Sentiment + reflection recorded', reflection.narrative || '');
  logReasoning(`SENTIMENT+REFLECT: ${JSON.stringify({ sentiment, reflection })}`);
  appendLiveFinding('Mapped sentiment and reflection in one request');

  let extraSnippets = [];

  if (!sat && (reflection.nextQueries || []).length > 0) {
    addStep('gap', 'Detected gap — one extra search (no second reflection pass)…', 'thinking');
    const q = reflection.nextQueries[0];
    let extra;
    try {
      extra = await searchRelated(q);
    } catch (e) {
      extra = { results: [] };
    }
    const ex = (extra.results || []).slice(0, 2);
    for (const r of ex) {
      try {
        const body = await fetchContentWithRetry(r.url);
        extraSnippets.push({ title: r.title, url: r.url, body: body.slice(0, 4000) });
        addGraphNode(r.title || 'extra', r.url);
      } catch {
        extraSnippets.push({ title: r.title, url: r.url, body: r.snippet || '' });
      }
    }
    finishStep('gap', 'Gap-fill fetch complete', `${extraSnippets.length} supplemental item(s)`);
    comparisons.push({
      source: 'supplemental',
      agreements: [],
      disagreements: reflection.gaps || [],
      note: 'From gap-fill search',
    });
  }

  addStep('report', 'Compiling final report…', 'thinking');
  appendLiveFinding('Reflection complete — synthesizing executive summary and structured assessment');

  const vcContextBlock =
    vcFirms.length === 0
      ? 'VC module: not run (SerpAPI key missing, API error, or no firms extracted).'
      : [
          `VC discovery query: ${vcSearchQuery}`,
          `VC firms + theses: ${JSON.stringify(
            vcFirms.map((f) => ({ name: f.name, website: f.website, thesis: f.thesis }))
          ).slice(0, 8000)}`,
          `VC alignment (prior scoring pass): ${JSON.stringify(vcAlignment || []).slice(0, 6000)}`,
          `VC reflection: ${JSON.stringify({
            hasGap: vcReflectMeta.hasGap,
            rationale: vcReflectMeta.rationale,
            suggestedSearchQuery: vcReflectMeta.suggestedSearchQuery,
            supplementalBullets: vcReflectMeta.extraDigest,
          }).slice(0, 4000)}`,
        ].join('\n');

  const reportPrompt = `Produce the FINAL structured report as JSON ONLY (no markdown fence):
{
  "executiveSummary": ["sentence1","sentence2","sentence3"],
  "keyThemes": ["..."],
  "sentimentAnalysis": {"summary":"","evidence":[{"source":"","detail":""}]},
  "credibility": [{"source":"","assessment":"","signals":""}],
  "competingPerspectives": {"summary":"","contrasts":[{"point":"","howSourcesDiffer":""}]},
  "audienceReach": {"summary":"","reasoning":""},
  "vcDiscovery": {"query":"","firms":[{"name":"","website":""}]},
  "vcAlignmentScores": [{"firmName":"","website":"","alignmentScore":0,"topReasons":["","",""],"gaps":["",""],"pitchAngle":""}],
  "vcReflect": {"rationale":"","followUpQuery":"","supplementalNotes":""},
  "agentConfidence": 0-100,
  "confidenceRationale": ""
}

For vcDiscovery / vcAlignmentScores / vcReflect: if no VC research ran, use query "" and empty arrays plus empty strings. Otherwise echo the VC context faithfully (you may tighten wording but keep scores and firm names).

Context:
- Input type: ${inputType}
- Primary excerpt: ${truncate(primaryContent, 4500)}
- Authors/topics JSON: ${JSON.stringify(topicBundle)}
- Related meta: ${JSON.stringify(relatedBodies.map((r) => ({ title: r.title, url: r.url })))}
- Comparisons: ${JSON.stringify(comparisons).slice(0, 6000)}
- Sentiment JSON: ${JSON.stringify(sentiment)}
- Extra: ${JSON.stringify(extraSnippets).slice(0, 3000)}
- Plan rationale: ${plan.rationale || ''}

--- VC context (agentic steps 3–6) ---
${vcContextBlock}`;

  let reportJson;
  try {
    const reportRaw = await analyzeWithGemini('Synthesize.', reportPrompt, {
      maxIn: 8000,
      temperature: 0.35,
      json: true,
      retries: 5,
      maxOut: 8192,
    });
    reportJson = parseJsonLoose(reportRaw);
  } catch (e) {
    reportJson = null;
    logReasoning(`Report gen error: ${e.message}`);
  }

  finishStep('report', 'Final report ready', '');

  removeLiveBuildSection();
  renderFinalReport(reportJson, {
    plan,
    topicBundle,
    sentiment,
    comparisons,
    finalConfidence: typeof finalConfidence === 'number' ? finalConfidence : reportJson?.agentConfidence,
    relatedBodies,
    extraSnippets,
    searchTopic,
    quotaError: state.lastQuotaError,
    vc: {
      query: vcSearchQuery,
      firms: vcFirms,
      alignment: vcAlignment,
      reflect: vcReflectMeta,
    },
  });

  const pre = document.createElement('pre');
  pre.textContent = state.reasoningLog.join('\n');
  const details = document.createElement('details');
  details.className = 'raw-log';
  details.innerHTML = '<summary>Raw agent reasoning log</summary>';
  details.appendChild(pre);
  document.getElementById('report-sections').appendChild(details);
}

function renderFinalReport(reportJson, ctx) {
  const esc = (s) =>
    String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

  if (ctx.quotaError && !reportJson) {
    const vendor = state.llmBackend === 'groq' ? 'Groq' : 'Google Gemini';
    appendReportSection(
      'API quota / rate limit',
      '<p><strong>' +
        esc(vendor) +
        ' returned HTTP 429 — quota or rate limit exceeded.</strong> This app makes many model calls per run (plan, topic, compare×3, sentiment, reflect, report). Free tiers have per-minute and daily caps; long pages use more input tokens per call.</p>' +
        '<ul>' +
        '<li>Wait a few minutes (or until the next daily window) and try again.</li>' +
        '<li>If using Gemini: enable billing or check <a href="https://ai.google.dev/gemini-api/docs/rate-limits" target="_blank" rel="noopener">Gemini rate limits</a>. If using Groq: see <a href="https://console.groq.com/docs/rate-limits" target="_blank" rel="noopener">Groq rate limits</a> or set <code>GROQ_MODEL</code> to a smaller/faster model.</li>' +
        '<li>Or add <strong>GROQ_API_KEY</strong> on Vercel to switch off a maxed-out Gemini free tier (Groq is used first when both keys are set).</li>' +
        '<li>Paste a <strong>short excerpt</strong> as text instead of a huge page to cut input tokens.</li>' +
        '</ul>' +
        '<p class="evidence">Last error (truncated): ' +
        esc((ctx.quotaError || '').slice(0, 400)) +
        '</p>'
    );
  } else if (ctx.quotaError && reportJson) {
    appendReportSection(
      'Rate limit (recovered)',
      '<p>At least one request hit a <strong>per-minute token (TPM) or request cap</strong> mid-run; the client waited and retried, and the report below still completed. For fewer interruptions, space out runs, paste shorter text, set <code>GROQ_MODEL=llama-3.1-8b-instant</code> on Vercel, or upgrade Groq billing tier.</p>' +
        '<details class="raw-log"><summary>Technical detail</summary><pre>' +
        esc((ctx.quotaError || '').slice(0, 500)) +
        '</pre></details>'
    );
  }

  if (!reportJson) {
    const why = ctx.quotaError
      ? 'The LLM could not complete the final JSON report, likely due to quota limits above.'
      : 'The model could not return structured JSON; showing key facts from the run.';
    const topicShow = ctx.topicBundle?.topic || ctx.searchTopic || '—';
    let fallbackEx =
      '<p>' +
      esc(why) +
      '</p><ul>' +
      `<li>Input type: ${esc(ctx.plan?.inputType)}</li>` +
      `<li>Focus topic: ${esc(topicShow)}</li>` +
      `<li>Related sources loaded: ${ctx.relatedBodies?.length || 0}</li></ul>`;
    const fVc = ctx.vc?.alignment;
    if (Array.isArray(fVc) && fVc.length) {
      fallbackEx +=
        '<p><strong>VC alignment (from run, report JSON missing)</strong></p><ul>' +
        fVc
          .map(
            (s) =>
              '<li><strong>' +
              esc(s.firmName) +
              '</strong>: ' +
              esc(s.alignmentScore) +
              '/100 — ' +
              esc((s.pitchAngle || '').slice(0, 200)) +
              '</li>'
          )
          .join('') +
        '</ul>';
    }
    appendReportSection('Executive summary', fallbackEx);
  } else {
    const ex = reportJson.executiveSummary || [];
    const exHtml = '<p>' + ex.map((s) => esc(s)).join(' ') + '</p>';
    appendReportSection('Executive summary', exHtml);

    const themes = reportJson.keyThemes || [];
    appendReportSection(
      'Key themes and topics',
      '<ul>' + themes.map((t) => '<li>' + esc(t) + '</li>').join('') + '</ul>'
    );

    const sa = reportJson.sentimentAnalysis || {};
    const ev = sa.evidence || [];
    appendReportSection(
      'Sentiment analysis',
      '<p>' + esc(sa.summary || '') + '</p>' +
        (ev.length
          ? '<div class="evidence">' +
            ev.map((e) => '<p><strong>' + esc(e.source) + ':</strong> ' + esc(e.detail) + '</p>').join('') +
            '</div>'
          : '')
    );

    const cred = reportJson.credibility || [];
    appendReportSection(
      'Source credibility',
      '<ul>' +
        cred
          .map(
            (c) =>
              '<li><strong>' +
              esc(c.source) +
              '</strong> — ' +
              esc(c.assessment) +
              (c.signals ? '<div class="evidence">' + esc(c.signals) + '</div>' : '') +
              '</li>'
          )
          .join('') +
        '</ul>'
    );

    const cp = reportJson.competingPerspectives || {};
    const cx = cp.contrasts || [];
    appendReportSection(
      'Competing perspectives',
      '<p>' + esc(cp.summary || '') + '</p>' +
        (cx.length
          ? '<ul>' +
            cx
              .map(
                (x) =>
                  '<li><strong>' +
                  esc(x.point) +
                  '</strong><div class="evidence">' +
                  esc(x.howSourcesDiffer) +
                  '</div></li>'
              )
              .join('') +
            '</ul>'
          : '')
    );

    const ar = reportJson.audienceReach || {};
    appendReportSection(
      'Audience and reach potential',
      '<p>' + esc(ar.summary || '') + '</p>' +
        (ar.reasoning ? '<div class="evidence">' + esc(ar.reasoning) + '</div>' : '')
    );

    const vcScores =
      (Array.isArray(reportJson.vcAlignmentScores) && reportJson.vcAlignmentScores.length
        ? reportJson.vcAlignmentScores
        : null) ||
      (Array.isArray(ctx.vc?.alignment) && ctx.vc.alignment.length ? ctx.vc.alignment : null);
    const vcDisc = reportJson.vcDiscovery || {};
    const vcRef = reportJson.vcReflect || {};
    if (vcScores && vcScores.length) {
      const rawQ = vcDisc.query || ctx.vc?.query || '';
      const qLabel = rawQ || (ctx.vc?.firms?.length ? 'VC discovery' : '');
      let block =
        (qLabel ? '<p class="evidence">Discovery query: ' + esc(qLabel) + '</p>' : '') +
        vcScores
          .map((s) => {
            const reasons = (s.topReasons || []).slice(0, 3);
            const gaps = (s.gaps || []).slice(0, 2);
            const w = esc(s.website || '');
            return (
              '<div class="vc-firm-block">' +
              '<h4>' +
              esc(s.firmName || 'Firm') +
              (w ? ' <a href="' + w + '" target="_blank" rel="noopener">site</a>' : '') +
              '</h4>' +
              '<p><strong>Alignment:</strong> ' +
              esc(s.alignmentScore ?? '—') +
              '/100</p>' +
              (reasons.length
                ? '<p><strong>Why it fits</strong></p><ul>' +
                  reasons.map((r) => '<li>' + esc(r) + '</li>').join('') +
                  '</ul>'
                : '') +
              (gaps.length
                ? '<p><strong>Gaps / mismatches</strong></p><ul>' +
                  gaps.map((g) => '<li>' + esc(g) + '</li>').join('') +
                  '</ul>'
                : '') +
              (s.pitchAngle ? '<p><strong>Pitch angle:</strong> ' + esc(s.pitchAngle) + '</p>' : '') +
              '</div>'
            );
          })
          .join('');
      const sup =
        vcRef.supplementalNotes ||
        vcRef.supplementalBullets ||
        ctx.vc?.reflect?.extraDigest ||
        '';
      if (sup) {
        block +=
          '<p><strong>Reflection follow-up</strong></p><div class="evidence">' +
          esc(sup).replace(/\n/g, '<br/>') +
          '</div>';
      }
      if (vcRef.rationale || ctx.vc?.reflect?.rationale) {
        block +=
          '<div class="evidence">' +
          esc(vcRef.rationale || ctx.vc.reflect.rationale) +
          '</div>';
      }
      appendReportSection('VC alignment (thesis fit)', block);
    } else if (ctx.vc?.firms?.length) {
      appendReportSection(
        'VC discovery',
        '<p>Firms were identified but alignment scores were not available in the final JSON.</p><ul>' +
          ctx.vc.firms
            .map(
              (f) =>
                '<li><strong>' +
                esc(f.name) +
                '</strong> — <a href="' +
                esc(f.website) +
                '" target="_blank" rel="noopener">' +
                esc(f.website) +
                '</a></li>'
            )
            .join('') +
          '</ul>'
      );
    }

    const conf = reportJson.agentConfidence ?? ctx.finalConfidence ?? 65;
    const cr = reportJson.confidenceRationale || '';
    appendReportSection(
      'Agent confidence',
      '<p>' +
        esc(cr) +
        '</p><div class="confidence-bar"><div class="confidence-fill" style="width:' +
        Math.min(100, Math.max(0, conf)) +
        '%"></div></div><p class="evidence">Score: ' +
        esc(conf) +
        '/100</p>'
    );
  }
}
  </script>
</body>
</html>
